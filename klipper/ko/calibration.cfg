[tools_calibrate]
pin: ^PD11        #툴세터 핀
travel_speed: 15  # 프로빙 속도
spread: 4.5         # 프로빙 범위
lower_z: 0.6      # 누름 이동 거리; 보정 품질에 영향이 있어 보이므로 자신의 장비에서 적절한 값을 테스트해야 합니다
speed: 2          # 프로브 트리거 사이의 리트랙트 속도 (mm/s)
lift_speed: 4     # 프로빙 완료 후 Z축 상승 속도. 설정한 상승 높이는 각 툴헤드 사이의 물리적 Z 높이 차이보다 커야 합니다
final_lift_z: 1   # 프로빙 최종 완료 후 Z축 안전 상승 높이
sample_retract_dist: 2  # 각 프로빙 후 리트랙트 거리 (mm)
samples_tolerance: 0.1 # 여러 프로빙 결과의 허용 오차 범위; 초과하면 재시도하거나 오류 처리
samples: 5              # 프로빙 샘플 수
samples_result: median  # 샘플 결과 계산 방식: median 또는 average

[gcode_macro _TOOL_CALIB_VARS]
variable_sensor_x: 112.5      # 보정 센서 중심 X 좌표
variable_sensor_y: -4      # 보정 센서 중심 Y 좌표
variable_safe_x: 112         # 툴체인지/대기 안전 X 위치
variable_safe_y: 10.0         # 툴체인지/대기 안전 Y 위치
variable_safe_z: 10.0         # 툴체인지/대기 안전 Z 높이
variable_tool_count: 4       # 전체 툴 수; 예를 들어 0과 1이면 총 2개
gcode:
    # 여기에는 명령이 필요 없으며 변수 저장용입니다
# ---------------------------------------------------------
# 단일 툴 보정
# 호출 예: CALIBRATE_TOOL TOOL=1
# ---------------------------------------------------------
[gcode_macro CALIBRATE_TOOL]
gcode:
    {% set tool = params.TOOL|default(0)|int %}
    {% set vars = printer["gcode_macro _TOOL_CALIB_VARS"] %}

    G1 X{vars.safe_x} Y{vars.safe_y} Z{vars.safe_z} F9000
    T{tool}
    G1 X{vars.safe_x} Y{vars.safe_y} Z{vars.safe_z} F9000
    G1 X{vars.sensor_x} Y{vars.sensor_y} F9000

    {% if tool == 0 %}
        {action_respond_info("T0 기준점을 보정 중...")}
        TOOL_LOCATE_SENSOR
        M400                  # 중요: 프로빙 동작이 완전히 끝날 때까지 대기
        G4 P500               # 중요: 시스템이 좌표 재설정을 처리하도록 0.5초 정지
        _DO_SAVE_CALIB_RESULT TOOL=0
    {% else %}
        {action_respond_info("T" ~ tool ~ " 오프셋 보정 중...")}
        TOOL_CALIBRATE_TOOL_OFFSET
        M400                  # 중요: 동작이 끝날 때까지 대기
        _DO_SAVE_CALIB_RESULT TOOL={tool}
    {% endif %}

    M400
    G90
    G1 Z{vars.safe_z} F600    # 프로빙 후 먼저 Z축만 상승
    G1 X{vars.safe_x} Y{vars.safe_y} F9000
    UNTOOL

[gcode_macro _DO_SAVE_CALIB_RESULT]
gcode:
    {% set tool = params.TOOL|int %}
    {% set res = printer.tools_calibrate.last_result %}

    {% if tool == 0 %}
        # T0는 항상 0으로 저장
        SAVE_VARIABLE VARIABLE=t0_offset_x VALUE=0.0
        SAVE_VARIABLE VARIABLE=t0_offset_y VALUE=0.0
        SAVE_VARIABLE VARIABLE=t0_offset_z VALUE=0.0
        {action_respond_info("T0 기준 좌표가 잠겼습니다")}
    {% else %}
        # 다른 툴은 프로빙 결과를 저장
        SAVE_VARIABLE VARIABLE=t{tool}_offset_x VALUE={res[0]|round(6)}
        SAVE_VARIABLE VARIABLE=t{tool}_offset_y VALUE={res[1]|round(6)}
        SAVE_VARIABLE VARIABLE=t{tool}_offset_z VALUE={res[2]|round(6)}
        {action_respond_info("T" ~ tool ~ " 오프셋이 자동 저장되었습니다")}
    {% endif %}
# ---------------------------------------------------------
# 모든 툴 일괄 보정
# ---------------------------------------------------------
[gcode_macro CALIBRATE_ALL_TOOLS]
gcode:
    {% set vars = printer["gcode_macro _TOOL_CALIB_VARS"] %}

    {action_respond_info("완전 자동 툴 보정 절차를 시작합니다...")}

    # 모든 툴을 순회합니다. range(0, N)은 0부터 N-1까지 생성합니다
    {% for t in range(0, vars.tool_count) %}
        CALIBRATE_TOOL TOOL={t}
    {% endfor %}

    {action_respond_info("모든 툴 보정이 완료되었습니다")}
