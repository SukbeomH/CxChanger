[tools_calibrate]
pin: ^PD11        #toolsetter pin
travel_speed: 15  # probing speed
spread: 4.5         # probing range
lower_z: 0.6      # downward travel distance; test a suitable value for your setup, as it appears to affect calibration quality
speed: 2          # retract speed between probe triggers (mm/s)
lift_speed: 4     # Z lift speed after probing. The configured lift height must be greater than the physical Z-height difference between toolheads
final_lift_z: 1   # final safe Z lift height after probing completes
sample_retract_dist: 2  # retract distance after each probe (mm)
samples_tolerance: 0.1 # tolerance for multiple probe results; retry or error if exceeded
samples: 5              # number of probe samples
samples_result: median  # sample result method: median or average

[gcode_macro _TOOL_CALIB_VARS]
variable_sensor_x: 112.5      # calibration sensor center X coordinate
variable_sensor_y: -4      # calibration sensor center Y coordinate
variable_safe_x: 112         # safe X position for toolchange/standby
variable_safe_y: 10.0         # safe Y position for toolchange/standby
variable_safe_z: 10.0         # safe Z height for toolchange/standby
variable_tool_count: 4       # total number of tools, for example 0 and 1 means 2 tools
gcode:
    # no commands needed here; used only to store variables
# ---------------------------------------------------------
# calibrate a single tool
# example call: CALIBRATE_TOOL TOOL=1
# ---------------------------------------------------------
[gcode_macro CALIBRATE_TOOL]
gcode:
    {% set tool = params.TOOL|default(0)|int %}
    {% set vars = printer["gcode_macro _TOOL_CALIB_VARS"] %}

    G1 X{vars.safe_x} Y{vars.safe_y} Z{vars.safe_z} F9000
    T{tool}
    G1 X{vars.safe_x} Y{vars.safe_y} Z{vars.safe_z} F9000
    G1 X{vars.sensor_x} Y{vars.sensor_y} F9000

    {% if tool == 0 %}
        {action_respond_info("Calibrating the T0 reference point...")}
        TOOL_LOCATE_SENSOR
        M400                  # Important: wait for the probing move to finish completely
        G4 P500               # Important: pause for 0.5 seconds so the system can process coordinate reset
        _DO_SAVE_CALIB_RESULT TOOL=0
    {% else %}
        {action_respond_info("Calibrating T" ~ tool ~ " offset...")}
        TOOL_CALIBRATE_TOOL_OFFSET
        M400                  # Important: wait for the move to finish
        _DO_SAVE_CALIB_RESULT TOOL={tool}
    {% endif %}

    M400
    G90
    G1 Z{vars.safe_z} F600    # after probing, lift only the Z axis first
    G1 X{vars.safe_x} Y{vars.safe_y} F9000
    UNTOOL

[gcode_macro _DO_SAVE_CALIB_RESULT]
gcode:
    {% set tool = params.TOOL|int %}
    {% set res = printer.tools_calibrate.last_result %}

    {% if tool == 0 %}
        # T0 is always saved as 0
        SAVE_VARIABLE VARIABLE=t0_offset_x VALUE=0.0
        SAVE_VARIABLE VARIABLE=t0_offset_y VALUE=0.0
        SAVE_VARIABLE VARIABLE=t0_offset_z VALUE=0.0
        {action_respond_info("T0 reference coordinates locked")}
    {% else %}
        # save probe results for other tools
        SAVE_VARIABLE VARIABLE=t{tool}_offset_x VALUE={res[0]|round(6)}
        SAVE_VARIABLE VARIABLE=t{tool}_offset_y VALUE={res[1]|round(6)}
        SAVE_VARIABLE VARIABLE=t{tool}_offset_z VALUE={res[2]|round(6)}
        {action_respond_info("T" ~ tool ~ " offset saved automatically")}
    {% endif %}
# ---------------------------------------------------------
# batch-calibrate all tools
# ---------------------------------------------------------
[gcode_macro CALIBRATE_ALL_TOOLS]
gcode:
    {% set vars = printer["gcode_macro _TOOL_CALIB_VARS"] %}

    {action_respond_info("Starting fully automatic tool calibration...")}

    # iterate through all tools; range(0, N) generates 0 through N-1
    {% for t in range(0, vars.tool_count) %}
        CALIBRATE_TOOL TOOL={t}
    {% endfor %}

    {action_respond_info("All tools calibrated")}
