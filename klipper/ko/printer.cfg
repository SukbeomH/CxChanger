#control: pid                # PID 히트베드 온도 자동 보정 항목; PID 보정 완료 후 주석 처리됨
#pid_kp: 58.437              # PID 히트베드 온도 자동 보정 항목; PID 보정 완료 후 주석 처리됨
#pid_ki: 2.347               # PID 히트베드 온도 자동 보정 항목; PID 보정 완료 후 주석 처리됨
#pid_kd: 363.769             # PID 히트베드 온도 자동 보정 항목; PID 보정 완료 후 주석 처리됨

#####################################################################
#                            팬 설정                                #
#####################################################################
[fan]                        # 파트 냉각 팬
pin: PF8                     # 신호 포트
kick_start_time: 0.5         # 시작 시간; 변경하지 마십시오
off_below: 0.10              # 변경하지 마십시오
#--------------------------------------------------------------------
[heater_fan hotend_fan]
pin: PF9                     # 신호 포트
max_power: 1                 # 최대 속도
kick_start_time: 0.5         # 시작 시간; 변경하지 마십시오
heater: extruder,extruder1,extruder2,extruder3             # 연결 장치: 익스트루더
heater_temp: 50              # 팬이 시작되는 익스트루더 온도
fan_speed: 0.6               # 팬 속도
#--------------------------------------------------------------------
[heater_fan dock_fan]
pin: PA2                     # 신호 포트
max_power: 1.0               # 최대 속도
kick_start_time: 0.5         # 시작 시간; 변경하지 마십시오
heater: extruder,extruder1,extruder2,extruder3              # 연결 장치: 익스트루더
heater_temp: 50              # 팬이 시작되는 익스트루더 온도
fan_speed: 1.0               # 팬 속도
#--------------------------------------------------------------------

[controller_fan driver_fan]
pin: PA1                     # 실제 메인보드의 컨트롤러 팬 핀으로 변경
max_power: 1.0              # 팬 최대 출력
idle_timeout: 60            # 스테퍼 유휴 후 지연 시간(초)

#####################################################################
#                           레벨링 센서                               #
#####################################################################
[probe]
pin: PF2
x_offset: 2.88                  # 노즐 기준 센서 X축 오프셋
y_offset: 11.63                 # 노즐 기준 센서 Y축 오프셋
#z_offset: 5.07              # 노즐 기준 센서 Z축 오프셋
#PROBE_CALIBRATE, 프로브 보정
speed: 10                     # 레벨링 속도
samples: 3                   # 샘플 수
samples_result: median       # 샘플 결과 방식; 기본 median
sample_retract_dist: 3.0     # 레벨링 리트랙트 거리
lift_speed:8                # 상승 속도
samples_tolerance: 0.005     # 샘플 허용 오차; 너무 작으면 샘플 수가 늘어날 수 있음
samples_tolerance_retries: 6 # 허용 오차 초과 시 재시도 횟수

#####################################################################
#                               홈                                #
#####################################################################
[homing_override]
axes: z
set_position_z: 0
gcode:
    G91
    G1 Z10 F600
    G90

    # X가 홈 되었는지 확인하고, 아니면 홈 수행
    {% if "X" not in printer.toolhead.homed_axes %}
        G28 Y
        G91
        G1 Y-40 F2400
        G90
    {% endif %}
    M400

    # X가 홈 되었는지 확인하고, 아니면 홈 수행
    {% if "X" not in printer.toolhead.homed_axes %}
        G28 X
        G91
        G1 X-5 F1200
        G90
    {% endif %}

    UNTOOL  # 툴 언로드 매크로 실행

    # Z 홈을 위해 베드 중앙으로 이동; 베드 크기에 맞게 X150 Y150 조정
    G0 X{ printer.toolhead.axis_maximum.x/2 } Y{ printer.toolhead.axis_maximum.y/2 } F6000

    # 실제 Z 홈 수행
    G28 Z

    # 홈 후 약간 상승
    G1 Z20 F600

#####################################################################
#   3Z 레벨링
#####################################################################
[z_tilt]
# z_positions: 리드스크류의 물리 좌표, 회전 중심점
# 노즐이 리드스크류 바로 위로 이동할 수 있다고 가정했을 때의 XY 좌표입니다.
# 주의: 이 점들은 보통 출력 영역 밖에 있습니다.
z_positions:
    -10, -5           # 리드스크류 1(stepper_z) 물리 위치
    117.5, 255        # 리드스크류 2 (stepper_z1)  물리 위치
    245, 10           # 리드스크류 3(stepper_z2) 물리 위치

# points: 프로브가 측정하는 좌표점, 프로브가 베드에 닿는 지점
points:
    10, 10            # 첫 번째 측정점 (좌후방 리드스크류 근처)
    117.5, 205        # 두 번째 측정점 (우후방 리드스크류 근처)
    225, 10           # 세 번째 측정점 (전방 중앙 리드스크류 근처)

speed: 400            # 측정 사이 이동 속도
horizontal_move_z: 10 # 측정 전 상승 높이
retries: 6            # 정밀도에 도달할 때까지 허용되는 재시도 횟수
retry_tolerance: 0.01 # 정밀도 요구 사항
#####################################################################
#                              베드 메시 보정
#####################################################################
[bed_mesh]
speed: 300                   # 보정 속도
horizontal_move_z: 10        # 프로브가 다음 점으로 이동하기 전 필요한 Z 상승 높이
mesh_min: 10,10              # 최소 보정점 좌표 X, Y
mesh_max: 220, 225           # 최대 보정점 좌표 X, Y
probe_count: 5,5             # 샘플 지점 수; 4x4는 16점
mesh_pps: 2,2                # 보간 샘플 지점 수
algorithm: bicubic           # 알고리즘 모델
bicubic_tension: 0.2         # 알고리즘 보간 설정은 변경하지 마십시오

#####################################################################
#                    프로빙 전 활성 툴(핫엔드 모듈) 주차
#####################################################################
[gcode_macro Z_TILT_ADJUST]
rename_existing: Z_TILT_ADJUST_BASE
gcode:
    UNTOOL        # 먼저 툴이 없는지 확인
    Z_TILT_ADJUST_BASE {rawparams}  # 그 다음 원래 레벨링 명령 실행

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE
gcode:
    UNTOOL        # 먼저 툴이 없는지 확인
    BED_MESH_CALIBRATE_BASE {rawparams} # 그 다음 원래 레벨링 명령 실행

#####################################################################
#                              가속도계
#####################################################################
[lis2dw]
i2c_address: 25
# i2c_mcu: toolhead          # 생략하면 메인 MCU 사용
# i2c_bus: i2c3              # 소프트웨어 I2C 실패 시 하드웨어 I2C 시도
i2c_speed: 400000
i2c_software_scl_pin: PA9
i2c_software_sda_pin: PA10

[resonance_tester]
accel_chip: lis2dw
accel_per_hz: 50
probe_points: 120, 120, 20   # 베드 중심과 약 20 mm의 안전한 Z 높이로 설정

[input_shaper]
# 공진 보정 후 SAVE_CONFIG가 값을 기록할 때까지 비워 둡니다.

#####################################################################
#                           사용자 G-code 매크로                            #
#####################################################################

[gcode_macro PRINT_START]
description: 출력 시작 매크로: 홈, 레벨링, 재료별 독립 온도 가열, 순차 프라이밍 라인
gcode:
    # ==========================================
    # 1. 프라이밍 라인 파라미터
    # ==========================================
    {% set cfg_start_x = params.START_X|default(10.0)|float %}
    {% set cfg_start_y = params.START_Y|default(5.0)|float %}
    {% set cfg_offset_y = params.OFFSET_Y|default(2.0)|float %}
    {% set cfg_length = params.LENGTH|default(50.0)|float %}
    {% set cfg_pre_extrude = params.PRE_EXTRUDE|default(3.0)|float %}
    {% set cfg_retract = 0 %}
    {% set cfg_speed_xy = 24000 %}
    {% set cfg_speed_z = 3000 %}

    # ==========================================
    # 2. 슬라이서 파라미터를 읽고 실제 사용하는 툴 식별
    # ==========================================
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set INITIAL_TOOL = params.INITIAL_TOOL|default("0")|string %}
    {% set ns = namespace(tools="", temps="") %}

    # 지원하는 슬라이서 슬롯 T0~T4를 확인합니다.
    {% for i in range(5) %}
        {% set temp_key = 'T' ~ i ~ '_TEMP' %}
        {% set used_key = 'T' ~ i ~ '_USED' %}
        {% set ext_name = "extruder" if i == 0 else "extruder" ~ i %}

        {% if temp_key in params and ext_name in printer.heaters.available_heaters %}
            {% set t_val = params[temp_key]|float %}
            {% set is_used = params[used_key]|default("1")|string|lower %}
            {% if t_val > 0 and (is_used == "1" or is_used == "true") %}
                {% set ns.tools = ns.tools ~ i ~ "," %}
                {% set ns.temps = ns.temps ~ t_val ~ "," %}
            {% endif %}
        {% endif %}
    {% endfor %}

    {% set tool_list = ns.tools.strip(',').split(',') %}
    {% set temp_list = ns.temps.strip(',').split(',') %}

    # 유효한 툴이 없으면 초기 툴만 200 C로 가열합니다.
    {% if tool_list|length == 1 and tool_list[0] == "" %}
        {% set tool_list = [INITIAL_TOOL] %}
        {% set temp_list = [200.0] %}
    {% endif %}

    # ==========================================
    # 3. 베드 예열, 홈, 레벨링
    # ==========================================
    BED_MESH_CLEAR
    M140 S{BED_TEMP}
    G28
    Z_TILT_ADJUST
    G28 Z
    G1 Z20 F{cfg_speed_z}
    BED_MESH_PROFILE LOAD=default
    M190 S{BED_TEMP}

    # ==========================================
    # 4. 사용하는 모든 툴을 각각의 목표 온도로 가열
    # ==========================================
    # 모든 히터를 동시에 가열하기 시작합니다.
    {% for i in range(tool_list|length) %}
        {% if tool_list[i] != "" and temp_list[i] != "" %}
            M104 S{temp_list[i]} T{tool_list[i]}
        {% endif %}
    {% endfor %}

    # 각 히터가 목표 온도에 도달할 때까지 기다립니다.
    {% for i in range(tool_list|length) %}
        {% if tool_list[i] != "" and temp_list[i] != "" %}
            M109 S{temp_list[i]} T{tool_list[i]}
        {% endif %}
    {% endfor %}

    # ==========================================
    # 5. 툴을 순서대로 전환하고 프라이밍 라인 생성
    # ==========================================
    SAVE_GCODE_STATE NAME=print_start_state
    G90
    G92 E0
    {% set ns_line = namespace(line_index=0) %}

    # 5.1 초기 툴이 아닌 툴부터 프라이밍합니다.
    {% for tool in tool_list %}
        {% if tool != "" and tool != INITIAL_TOOL %}
            T{tool}
            {% set current_y = cfg_start_y + (ns_line.line_index * cfg_offset_y) %}

            G1 Z5.0 F{cfg_speed_z}
            G1 X{cfg_start_x} Y{current_y} F{cfg_speed_xy}
            G1 Z0.28 F1500

            G91
            G1 E{cfg_pre_extrude} F300
            G1 X{cfg_length * 0.6} E{cfg_length * 0.12} F1000
            G1 X{cfg_length * 0.4} E{cfg_length * 0.05} F1500
            G1 E-{cfg_retract} F2100
            G1 Z2.0 F{cfg_speed_z}

            G90
            G92 E0
            M104 S0 T{tool}
            {% set ns_line.line_index = ns_line.line_index + 1 %}
        {% endif %}
    {% endfor %}

    # 5.2 초기 툴을 마지막으로 프라이밍해 바로 출력할 수 있게 합니다.
    {% if INITIAL_TOOL in tool_list %}
        T{INITIAL_TOOL}
        {% set current_y = cfg_start_y + (ns_line.line_index * cfg_offset_y) %}

        G1 Z5.0 F{cfg_speed_z}
        G1 X{cfg_start_x} Y{current_y} F{cfg_speed_xy}
        G1 Z0.28 F1500

        G91
        G1 E{cfg_pre_extrude} F300
        G1 X{cfg_length * 0.6} E{cfg_length * 0.12} F1000
        G1 X{cfg_length * 0.4} E{cfg_length * 0.05} F1500
        G1 E-{cfg_retract} F2100
        G1 Z2.0 F{cfg_speed_z}

        G90
        G92 E0
    {% endif %}

    # ==========================================
    # 6. 상태를 복원하고 초기 툴 오프셋 적용
    # ==========================================
    RESTORE_GCODE_STATE NAME=print_start_state

    {% if INITIAL_TOOL in tool_list %}
        {% set svv = printer.save_variables.variables %}
        {% set off_x = svv["t" ~ INITIAL_TOOL ~ "_offset_x"] | default(0.0) | float %}
        {% set off_y = svv["t" ~ INITIAL_TOOL ~ "_offset_y"] | default(0.0) | float %}
        {% set off_z = svv["t" ~ INITIAL_TOOL ~ "_offset_z"] | default(0.0) | float %}

        SET_GCODE_OFFSET X={off_x} Y={off_y} Z={off_z} MOVE=0
        { action_respond_info("초기 툴 T" ~ INITIAL_TOOL ~ " 오프셋 적용: X=" ~ off_x ~ " Y=" ~ off_y ~ " Z=" ~ off_z) }
    {% endif %}

    { action_respond_info("프라이밍 완료. 현재 툴은 T" ~ INITIAL_TOOL ~ "이며 출력 준비가 끝났습니다.") }
#--------------------------------------------------------------------
[gcode_macro PRINT_END]
description: 출력 종료 매크로: 활성 툴 주차, 가열 끄기, 파트 제거를 위해 베드 하강
gcode:
    # 1. 프린터 설정 범위 가져오기
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    # 2. 활성 툴(핫엔드 모듈) 주차 및 오프셋 재설정
    UNTOOL
    SET_GCODE_OFFSET X=0 Y=0 Z=0

    M400                              # 버퍼가 비워질 때까지 대기
    G92 E0                            # 익스트루더 위치 카운터 초기화

    # 3. 먼저 상대 좌표로 작은 안전 상승 수행
    G91                               # 상대 좌표
    # 최대 높이를 넘지 않으면 5 mm 상승
    {% if printer.toolhead.position.z < (max_z - 5) %}
        G0 Z5 F3600
    {% endif %}

    # 4. 모든 히터와 팬 끄기
    M104 S0 T0
    M104 S0 T1
    M104 S0 T2
    M104 S0 T3
    M140 S0                           # 히트베드 끄기
    M106 S0                           # 파트 냉각 팬 끄기

    # 5. 절대 좌표로 파트 제거 위치 이동 수행
    G90                               # 절대 좌표로 전환
    {% set safe_z = max_z - 10 %}

    G0 X{max_x-5} Y{max_y-5} Z{safe_z} F6000

    # 6. 후처리
    M400                              # 이동 완료 대기
    BED_MESH_CLEAR                    # 베드 메시 해제
    # M84                             # 선택 사항: 수동 파트 제거를 쉽게 하려면 이 줄 주석을 해제해 모터를 끌 수 있습니다

    { action_respond_info("출력이 완료되었습니다. 베드가 내려갔으니 파트를 제거하십시오.") }
