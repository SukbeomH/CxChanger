#####################################################################
#                               파일 include                               #
#####################################################################
[include fluidd.cfg]          # FLUIDD include 파일.
#[include mainsail.cfg]        # MAINSAIL include 파일.
[include toolchange.cfg]
[include calibration.cfg]
#[include plr.cfg]
#####################################################################
#                               메인보드 설정                               #
#####################################################################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_12345-if00
[mcu host]
serial: /tmp/klipper_host_mcu

#####################################################################
#                            확장 보드 설정                             #
#####################################################################
[mcu expander]
# 첫 단계에서 얻은 새 보드 ID를 여기에 입력
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_3F0035000357465036383420-if00
#####################################################################
#                            프린터 기종 및 가속도                            #
#####################################################################
[printer]                       # 프린터 설정
kinematics: corexy              # 키네마틱 구조: Cartesian, CoreXY 등. Cartesian은 cartesian 사용
max_velocity: 600               # 프린터 최대 속도
max_accel: 30000                 # 최대 가속도
max_z_velocity: 30              # Z축 최대 속도
max_z_accel: 300                # Z축 최대 가속도
square_corner_velocity: 5.0     # 스퀘어 코너 속도; 값을 낮추면 무거운 베드 관성 영향을 줄일 수 있음
#####################################################################
#                             온도 모니터링                               #
#####################################################################
[temperature_sensor FLY-Pi]
sensor_type: temperature_host

#[temperature_sensor Fly-C8p]     # FLY 메인보드 온도, 필요 시 이름 변경 가능
#sensor_type: temperature_mcu     # 연결된 MCU, 기본값

# [temperature_sensor Box]          # 챔버 내부 온도; 온도 센서 추가 필요, 참고 설정
# sensor_type: ATC Semitec 104GT-2  # 센서 유형
# sensor_pin: PA4                   # 신호 포트

#####################################################################
#             X/Y 스테퍼 설정 (X/Y Stepper Settings)                 #
#####################################################################
#   B Motor ---- Motor A
#   |                  |
#   |------익스트루더-------|
#   |                  |
#   |                  |
#          정면
#####################################################################
#                  X축 스테퍼 모터 (B Motor)                            #
#####################################################################
[stepper_x]
step_pin: PE5                       # X축 모터 step 핀
dir_pin: !PA8                        # X축 모터 방향 핀; 실제 장비에서 방향 확인, !는 방향 반전
enable_pin: !PA15                   # X축 모터 enable 핀; enable 핀에는 !가 필요하며 없으면 모터가 동작하지 않음
rotation_distance: 40               # 구동 풀리 둘레 mm; 2GT-20T는 40, 2GT-16T는 32
microsteps: 64                      # 모터 마이크로스텝 설정; 높을수록 품질은 좋아지지만 컨트롤러 부하가 증가
full_steps_per_rotation: 200        # 모터 1회전 스텝 수; 1.8도 모터 200, 0.9도 모터 400
endstop_pin:tmc2209_stepper_x:virtual_endstop                   # 엔드스톱 핀; NC 권장, !를 추가해 반전, 위치 io-3 !PB3
position_min: -10                     # X축 최소 이동 범위
position_endstop: 245            # 엔드스톱 위치 (250mm-300mm-350mm)
position_max: 245                   # X축 최대 이동 범위 (250mm-300mm-350mm)
homing_speed: 50                    # 홈 속도; 최대 100, 너무 빠르지 않게 권장
homing_retract_dist: 0              # 첫 홈 스위치 트리거 후 후퇴 거리
#--------------------------------------------------------------------
[tmc2209 stepper_x]                 # X 드라이버 설정 - TMC2209
uart_pin: PC9                       # UART 포트 핀 정의
interpolate: False                  # 256 마이크로스텝 보간 사용 여부; 끄는 것을 권장, True는 켬, False는 끔
run_current: 1.2                   # 모터 구동 전류, mA
sense_resistor: 0.110               # 드라이버 sense 저항은 변경하지 마십시오
driver_SGTHRS:90
diag_pin:^PD9
#stealthchop_threshold: 100          # stealthChop 임계값; 저소음이 필요 없으면 0으로 설정
#####################################################################
#                  Y축 스테퍼 모터 (A Motor)                            #
#####################################################################
[stepper_y]
step_pin: PE4                       # Y축 모터 step 핀
dir_pin: PC11                      # Y축 모터 방향 핀; 실제 장비에서 방향 확인, !는 방향 반전
enable_pin: !PC12                   # Y축 모터 enable 핀; enable 핀에는 !가 필요하며 없으면 모터가 동작하지 않음
rotation_distance: 40               # 구동 풀리 둘레 mm; 2GT-20T는 40, 2GT-16T는 32
microsteps: 64                      # 모터 마이크로스텝 설정; 높을수록 품질은 좋아지지만 컨트롤러 부하가 증가
full_steps_per_rotation: 200        # 모터 1회전 스텝 수; 1.8도 모터 200, 0.9도 모터 400
endstop_pin:^!PD10
position_min: -33                   # Y축 최소 이동 범위
position_endstop: 229               # 엔드스톱 위치 (250mm-300mm-350mm)
position_max: 229                   # Y축 최대 이동 범위 (250mm-300mm-350mm)
homing_speed: 50                    # 홈 속도; 최대 100, 너무 빠르지 않게 권장
homing_retract_dist: 5              # 첫 홈 스위치 트리거 후 후퇴 거리 5
#--------------------------------------------------------------------
[tmc2209 stepper_y]                 # Y 드라이버 설정 - TMC2209
uart_pin: PC10                      # UART 포트 핀 정의
interpolate: false                  # 256 마이크로스텝 보간 사용 여부; 끄는 것을 권장, True는 켬, False는 끔
run_current: 1.2                    # 모터 구동 전류, mA
sense_resistor: 0.110               # 드라이버 sense 저항은 변경하지 마십시오
diag_pin:^PD8
#stealthchop_threshold: 100          # stealthChop 임계값; 저소음이 필요 없으면 0으로 설정
#####################################################################
#                           Z축 스테퍼 모터                              #
#####################################################################
##    Z 스테퍼 모터 - 좌전방
[stepper_z]
step_pin: PE3                 # Z축 모터 step 핀
dir_pin:  !PD1                 # Z축 모터 방향 핀; 실제 장비에서 방향 확인, !는 방향 반전
enable_pin: !PD2               # Z축 모터 enable 핀; enable 핀에는 !가 필요하며 없으면 모터가 동작하지 않음
rotation_distance: 8          # 리드스크류 리드 8; 실제 사용 상황에 맞게 수정, 총 3곳 수정 필요
full_steps_per_rotation: 200  # 모터 1회전 스텝 수; 1.8도 모터 200, 0.9도 모터 400)
microsteps: 64                # 모터 마이크로스텝 설정; 높을수록 품질은 좋아지지만 컨트롤러 부하가 증가
endstop_pin: probe:z_virtual_endstop            # 엔드스톱 핀; NC 권장, !를 추가해 반전, 위치 io-1
position_min: -10             # Z축 최소 이동 범위; 노즐 청소 설정에는 약 -5 필요
position_max: 100             # Z축 최대 이동 범위 (250mm-300mm-350mm)
homing_speed: 10               # 홈 속도, 최대 20
second_homing_speed: 3        # 2차 홈 속도, 최대 10
homing_retract_dist: 3        # 후퇴 거리
#--------------------------------------------------------------------
[tmc2208 stepper_z]
uart_pin: PD0                 # 드라이버 UART 포트
interpolate: false            # 256 마이크로스텝 보간
run_current: 0.8              # 구동 전류, mA
sense_resistor: 0.110         # 드라이버 sense 저항은 변경하지 마십시오
stealthchop_threshold: 500    # stealthChop 임계값; 저소음이 필요 없으면 0으로 설정
#--------------------------------------------------------------------
##    Z1 스테퍼 모터 - 후방
[stepper_z1]
step_pin: PE2                # Z1축 모터 step 핀
dir_pin:  !PD4               # Z1축 모터 방향 핀; 실제 장비에서 방향 확인, !는 방향 반전
enable_pin: !PD5              # Z1축 모터 enable 핀; enable 핀에는 !가 필요하며 없으면 모터가 동작하지 않음
rotation_distance: 8          # 리드스크류 리드 8
full_steps_per_rotation: 200  # 모터 1회전 스텝 수; 1.8도 모터 200, 0.9도 모터 400
microsteps: 64                # 모터 마이크로스텝 설정; 높을수록 품질은 좋아지지만 컨트롤러 부하가 증가
#--------------------------------------------------------------------
[tmc2208 stepper_z1]
uart_pin: PD3               # 드라이버 UART 포트
interpolate: false            # 256 마이크로스텝 보간
run_current: 0.8              # 구동 전류, mA
sense_resistor: 0.110         # 드라이버 sense 저항은 변경하지 마십시오
stealthchop_threshold: 500    # stealthChop 임계값; 저소음이 필요 없으면 0으로 설정
#--------------------------------------------------------------------
##    Z2 스테퍼 모터 - 우전방
[stepper_z2]
step_pin: PE7                 # Z2축 모터 step 핀
dir_pin: !PE11               # Z2축 모터 방향 핀; 실제 장비에서 방향 확인, !는 방향 반전
enable_pin: !PE10             # Z2축 모터 enable 핀; enable 핀에는 !가 필요하며 없으면 모터가 동작하지 않음
rotation_distance: 8          # 리드스크류 리드 8
full_steps_per_rotation: 200  # 모터 1회전 스텝 수; 1.8도 모터 200, 0.9도 모터 400
microsteps: 64                # 모터 마이크로스텝 설정; 높을수록 품질은 좋아지지만 컨트롤러 부하가 증가
#--------------------------------------------------------------------
[tmc2208 stepper_z2]
uart_pin: PC15                # 드라이버 UART 포트
interpolate: false            # 256 마이크로스텝 보간
run_current: 0.8              # 구동 전류, mA
sense_resistor: 0.110         # 드라이버 sense 저항은 변경하지 마십시오
stealthchop_threshold: 500    # stealthChop 임계값; 저소음이 필요 없으면 0으로 설정
#####################################################################
#                     E0 익스트루더 설정 （E0 Settings）                   #
#####################################################################

[extruder]
step_pin: PE0                       # 익스트루더 모터 step 핀
dir_pin: PC13                       # 익스트루더 모터 방향 핀
enable_pin: !PC14                   # 익스트루더 모터 enable 핀
rotation_distance: 55               # rotation distance 값
gear_ratio: 44:10, 37:17            # 기어비; Galileo는 7.5:1이고 이 줄은 주석 처리, BMG는 50:17, 출력축 전방, 입력축 후방
microsteps: 32                      # 모터 마이크로스텝 설정; 높을수록 품질은 좋아지지만 컨트롤러 부하가 증가
full_steps_per_rotation: 200        # 1회전 스텝 수; 200은 1.8도, 400은 0.9도
nozzle_diameter: 0.400              # 노즐 직경
filament_diameter: 1.75             # 필라멘트 직경
heater_pin: expander:PB12           # 히터 카트리지 핀
sensor_type: ATC Semitec 104GT-2    # 센서 유형  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: expander:PC0            # 센서 핀, ADC_0에 연결
min_temp: -273                      # 최소 온도; 측정 온도가 설정 범위를 벗어나면 긴급 정지 트리거
max_temp: 350                       # 최대 온도; 측정 온도가 설정 범위를 벗어나면 긴급 정지 트리거
max_power: 1.0                      # 최대 출력
min_extrude_temp: 0                 # 최소 압출 온도; 이 온도 이상이어야 익스트루더가 압출 가능
#노즐 온도 PID 보정 명령：  "PID_CALIBRATE HEATER=extruder TARGET=245
#control = pid                # PID 노즐 온도 자동 보정 항목; PID 보정 완료 후 주석 처리됨
#pid_kp = 26.213              # PID 노즐 온도 자동 보정 항목; PID 보정 완료 후 주석 처리됨
#pid_ki = 1.304               # PID 노즐 온도 자동 보정 항목; PID 보정 완료 후 주석 처리됨
#pid_kd = 131.721             # PID 노즐 온도 자동 보정 항목; PID 보정 완료 후 주석 처리됨

#--------------------------------------------------------------------
[tmc2208 extruder]                  # 익스트루더 드라이버 설정
uart_pin: PB7                      # UART 포트 핀 정의
interpolate: False                  # 256 마이크로스텝 보간 사용 여부; True는 켬, False는 끔
run_current: 0.8                    # 모터 구동 전류
sense_resistor: 0.110               # 드라이버 sense 저항은 변경하지 마십시오
#stealthchop_threshold: 500          # stealthChop 임계값; 익스트루더에는 권장하지 않으며 저소음이 필요 없으면 0으로 설정

