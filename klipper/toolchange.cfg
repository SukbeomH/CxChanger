[save_variables]
filename: ~/printer_data/config/myvariables.cfg

#=================================================
# Restore the last recorded tool state at startup
#=================================================
[delayed_gcode RESTORE_TOOL_STATUS]
initial_duration: 0.1
gcode:
    {% set svv = printer.save_variables.variables %}
    {% if svv.current_tool is defined %}
        SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=current_tool VALUE={svv.current_tool}
        M118 [Startup] Restored the previous tool state: T{svv.current_tool}
    {% else %}
        M118 [Startup] No saved tool state found; defaulting to no tool
    {% endif %}
#=================================================
# 1. centralized parameter management
#=================================================
[gcode_macro _toolchanger_cfg]
description: Tool-change parameter configuration

# --- toolchange lift, speed, and acceleration ---
variable_z_hop:            0.4    # Z lift during toolchange (mm)
variable_feed_z:           600    # Z lift speed (mm/min)
variable_feed_fast:        24000  # fast travel speed (mm/min)
variable_feed_slow:        5000   # loaded/alignment speed (mm/min)
variable_accel_toolchange: 15000  # acceleration during toolchange

# --- toolchange retract/prime configuration ---
variable_swap_retract_len: 0      # retract when returning a tool to its dock (mm)
variable_swap_prime_len:   0      # prime/compensation extrusion after pickup (mm)
variable_swap_retract_spd: 2000   # extrusion/retraction feed rate (mm/min)

# ========================================================
# 【dock motion logic parameters】
# ========================================================
variable_dock_shift_x: -3     # lateral X move used to open/close the extruder idler
variable_dock_dodge_y: 14     # relative Y offset for the clearance move
variable_dock_safe_y:  22     # relative Y offset for safe pull-out

#---------------------------------------------------------
# Absolute dock coordinates for each hotend module; adjust for your machine
#---------------------------------------------------------
# T0 configuration
variable_t0_dock_x: 232
variable_t0_dock_y: -20

# T1 configuration
variable_t1_dock_x: 202
variable_t1_dock_y: -20

# T2 configuration
variable_t2_dock_x: 172
variable_t2_dock_y: -20

# T3 configuration
variable_t3_dock_x: 142
variable_t3_dock_y: -20
gcode:
    # Variable storage only; no commands are required here

#=================================================
# 2. user-facing tool-change commands
#=================================================
[gcode_macro T0]
gcode: change_tool T=0

[gcode_macro T1]
gcode: change_tool T=1

[gcode_macro T2]
gcode: change_tool T=2

[gcode_macro T3]
gcode: change_tool T=3

[gcode_macro UNTOOL]
description: Park the active hotend module and leave the toolhead empty
gcode: change_tool T=-1

#=================================================
# 3. runtime state storage
#=================================================
[gcode_macro _tool_status]
variable_current_tool: -1
gcode:

#=================================================
# 4. release a hotend module (low-level motion macro)
#=================================================
[gcode_macro _release_tool]
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set active_extruder = printer.toolhead.extruder %}

    # Load the selected tool's dock parameters
    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    M118 --- [T{tool} release] Starting release sequence...

    # --- [A] release retract to prevent dock oozing ---
    {% set cur_temp = printer[active_extruder].temperature|float %}
    {% set min_temp = printer.configfile.settings[active_extruder].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp %}
       M118 --- [T{tool} release] Temperature is sufficient; retracting before release...
       M83
       G1 E-{cfg.swap_retract_len} F{cfg.swap_retract_spd}
    {% else %}
       M118 --- [T{tool} release] Temperature ({cur_temp} C) is too low; skipping retract
    {% endif %}

    # --- start physical release motion ---
    G90
    M118 --- [T{tool} release] Step 1: Move to the safe dock entrance
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}

    M118 --- [T{tool} release] Step 2: Push straight into the dock
    G0 X{dock_x} Y{dock_y} F{cfg.feed_fast}

    M118 --- [T{tool} release] Step 3: Shift X to open the extruder idler
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}

    M118 --- [T{tool} release] Step 4: Pull out along Y to disconnect the magnetic coupling
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow}

    M118 --- [T{tool} release] Step 5: Shift back to close the extruder idler safely
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_slow}

    M118 --- [T{tool} release] Step 6: Return to the safe entrance; release complete
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}

#=================================================
# 5. pick up a hotend module (low-level motion macro)
#=================================================
[gcode_macro _pickup_tool]
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set current_heater = "extruder" if tool == 0 else ("extruder" ~ tool) %}

    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    M118 +++ [T{tool} pickup] Starting pickup sequence...

    # --- start physical pickup motion ---
    G90
    M118 +++ [T{tool} pickup] Step 1: Move to the safe dock entrance
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}

    M118 +++ [T{tool} pickup] Step 2: Enter the clearance position
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_fast}

    M118 +++ [T{tool} pickup] Step 3: Shift X to prepare for insertion
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow}

    M118 +++ [T{tool} pickup] Step 4: Push into the dock and engage the magnetic coupling
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}

    M118 +++ [T{tool} pickup] Step 5: Shift back to clamp the filament
    G0 X{dock_x} Y{dock_y} F{cfg.feed_slow}

    # --- in-dock extrusion compensation ---
    {% set cur_temp = printer[current_heater].temperature|float %}
    {% set min_temp = printer.configfile.settings[current_heater].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp %}
         M118 +++ [T{tool} pickup] Temperature is sufficient; applying pickup prime...
         M83
         G1 E{cfg.swap_prime_len} F{cfg.swap_retract_spd}
    {% else %}
         M118 +++ [T{tool} pickup] Temperature ({cur_temp} C) is too low; skipping prime
    {% endif %}

    M118 +++ [T{tool} pickup] Step 6: Return to the safe entrance; pickup complete
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}

#=================================================
# 6. main tool-change dispatcher
#=================================================
[gcode_macro change_tool]
gcode:
    {% set new_tool = params.T|default(-1)|int %}
    {% set old_tool = printer["gcode_macro _tool_status"].current_tool|int %}
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}

    {% if new_tool == old_tool %}
        M118 [Toolchange] Target tool already matches the active tool (T{new_tool}); no action needed
    {% else %}
        {% if new_tool == -1 %}
            M118 [Toolchange] Unload requested; returning T{old_tool} to its dock...
        {% else %}
            M118 [Toolchange] Switching from T{old_tool} to T{new_tool}
        {% endif %}

        # 1. Save the current state and select the toolchange acceleration
        M118 [Toolchange] Saving coordinates and applying toolchange acceleration...
        SAVE_GCODE_STATE NAME=tool_change
        {% set saved_accel = printer.toolhead.max_accel %}
        SET_VELOCITY_LIMIT ACCEL={cfg.accel_toolchange}

        # 2. Lift Z
        M118 [Toolchange] Lifting Z by {cfg.z_hop} mm...
        G91
        G0 Z{cfg.z_hop} F{cfg.feed_z}
        G90

        # 3. Clear offsets and use absolute machine coordinates
        M118 [Toolchange] Temporarily clearing coordinate offsets...
        SET_GCODE_OFFSET X=0 Y=0 Z=0

        # 4. Release the old tool
        {% if old_tool != -1 %}
            _release_tool TOOL={old_tool}
        {% else %}
            M118 [Toolchange] Toolhead is already empty; skipping release
        {% endif %}

        # 5. Pick up the new tool
        {% if new_tool != -1 %}
            {% set next_heater = "extruder" if new_tool == 0 else ("extruder" ~ new_tool) %}
            {% set target_temp = printer[next_heater].target|float %}
            # Wait only when a nonzero target has not yet been reached
            {% if target_temp > 0 %}
                {% if printer[next_heater].temperature < (target_temp - 2) %}
                    M118 [Toolchange] T{new_tool} is below target; waiting for {target_temp} C...
                    TEMPERATURE_WAIT SENSOR={next_heater} MINIMUM={target_temp}
                {% endif %}
            {% endif %}

            _pickup_tool TOOL={new_tool}
        {% else %}
            M118 [Toolchange] Target is the unloaded state (-1); skipping pickup
        {% endif %}

        # 6. Update runtime state
        SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=current_tool VALUE={new_tool}

        # 7. Restore the saved state and acceleration
        M118 [Toolchange] Restoring pre-toolchange coordinates and acceleration...
        RESTORE_GCODE_STATE NAME=tool_change MOVE=0
        SET_VELOCITY_LIMIT ACCEL={saved_accel}

        # 8. Load and apply the new tool offset
        {% set svv = printer.save_variables.variables %}
        {% if new_tool != -1 %}
            {% set off_x = svv["t" ~ new_tool ~ "_offset_x"] | default(0.0) | float %}
            {% set off_y = svv["t" ~ new_tool ~ "_offset_y"] | default(0.0) | float %}
            {% set off_z = svv["t" ~ new_tool ~ "_offset_z"] | default(0.0) | float %}

            SET_GCODE_OFFSET X={off_x} Y={off_y} Z={off_z} MOVE=0
            M118 [Toolchange] Loaded T{new_tool} offset: X={off_x} Y={off_y} Z={off_z}
        {% endif %}

        # 9. Increment the lifetime count and persist state
        {% set total_changes = svv.total_tool_changes | default(0) | int + 1 %}
        SAVE_VARIABLE VARIABLE=total_tool_changes VALUE={total_changes}
        SAVE_VARIABLE VARIABLE=current_tool VALUE={new_tool}
        M118 [Toolchange] Complete. Lifetime tool changes: {total_changes}
    {% endif %}

#=================================================
# 7. Tool-change counter utilities
#=================================================
[gcode_macro GET_TOOL_CHANGE_COUNT]
description: Report the lifetime tool-change count
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set total_changes = svv.total_tool_changes | default(0) | int %}
    M118 [Toolchange count] Lifetime tool changes: {total_changes}

[gcode_macro RESET_TOOL_CHANGE_COUNT]
description: Reset the lifetime tool-change counter to zero
gcode:
    SAVE_VARIABLE VARIABLE=total_tool_changes VALUE=0
    M118 [Toolchange count] Lifetime tool-change counter reset to 0

#=================================================
# 8. Override M109 (heat and wait)
#=================================================
[gcode_macro M109]
rename_existing: M99109
gcode:
    {% set s = params.S|default(0)|float %}
    {% set r = params.R|default(0)|float %}
    {% set target_temp = s if s > 0 else r %}
    {% set tool_index = params.T|default(-1)|int %}
    {% set sensor_name = printer.toolhead.extruder %}

    # With no T parameter, target the currently mounted tool
    {% if tool_index == -1 %}
        {% set current_tool = printer["gcode_macro _tool_status"].current_tool|int %}
        {% set tool_index = current_tool %}
        M118 [M109] No T parameter specified; heating active tool T{current_tool}
    {% endif %}

    {% if tool_index != -1 %}
        {% if tool_index == 0 %}
            {% set sensor_name = "extruder" %}
        {% else %}
            {% set sensor_name = "extruder" ~ tool_index %}
        {% endif %}
    {% endif %}

    {% if target_temp > 0 %}
        M118 [M109] Heating {sensor_name} to {target_temp} C and waiting...
        {% if tool_index != -1 %}
            M104 S{target_temp} T{tool_index}
        {% else %}
            M104 S{target_temp}
        {% endif %}
        TEMPERATURE_WAIT SENSOR={sensor_name} MINIMUM={target_temp - 1.0}
        M118 [M109] Target temperature reached
    {% endif %}
