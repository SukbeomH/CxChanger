#     { action_respond_info("오류: 출력 중 필라멘트 런아웃 경보. 출력이 일시정지되었습니다.") }
#     PAUSE # 출력 중 트리거, 즉 런아웃 발생 시 동작
# insert_gcode:
#     { action_respond_info("필라멘트가 삽입되었습니다.") } # 필라멘트 삽입 시 동작

# [delayed_gcode DISABLE_SENSOR_ON_BOOT]
# # 시작 1초 후 이 매크로 자동 실행
# initial_duration: 1.0
# gcode:
#     # 런아웃 감지 강제 비활성화
#     SET_FILAMENT_SENSOR SENSOR=tool_sensor ENABLE=0
#     { action_respond_info("초기화: 현재 활성 핫엔드가 없어 런아웃 감지를 기본적으로 음소거했습니다.") }

#필라멘트 런아웃 및 툴체인지 실패 감지
# [gcode_macro _VERIFY_TOOL_AND_ENABLE_SENSOR]
# description: 픽업 완료 후 마이크로스위치 상태를 읽어 픽업 실패 여부 판정
# gcode:
