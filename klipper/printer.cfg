[virtual_sdcard]
path: /usr/share/printer_data/gcodes

[pause_resume]

[display_status]

[gcode_macro CANCEL_PRINT]
description: Cancel the active print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  CANCEL_PRINT_BASE
  G91
  G1 Z10 F600 ; Lift the nozzle 10 mm to avoid heat damage to the model
  UNTOOL
  M106 S0

[force_move]
enable_force_move: True

#####################################################################
#                               File includes                               #
#####################################################################
[include toolchange.cfg]
[include calibration.cfg]
#[include idm.cfg]
#####################################################################
#                               Mainboard configuration                               #
#####################################################################
[mcu]
serial:/dev/serial/by-id/usb-Klipper_stm32f407xx_37001E001650334636343620-if00

#[mcu host]
#serial: /tmp/klipper_host_mcu

#####################################################################
#                            Expansion board configuration                             #
#####################################################################
#[mcu expander]
# Enter the new board ID obtained in the first step here
#serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_3F0035000357465036383420-if00
#####################################################################
#                            Printer model and acceleration                            #
#####################################################################
[printer]                       # printer settings
kinematics: corexy              # kinematics type, such as Cartesian or CoreXY; Cartesian uses cartesian
max_velocity: 400               # maximum printer speed
max_accel: 20000                # maximum acceleration
max_z_velocity: 30              # maximum Z-axis speed
max_z_accel: 300                # maximum Z-axis acceleration
square_corner_velocity: 5.0     # square-corner velocity; a smaller value helps reduce inertia from a heavy bed
#####################################################################
#                             Temperature monitoring                               #
#####################################################################
[temperature_sensor MCU]
sensor_type: temperature_mcu

[temperature_sensor FLY-Pi]
sensor_type: temperature_host

#[temperature_sensor Fly-C8p]     # FLY mainboard temperature, rename if desired
#sensor_type: temperature_mcu     # associated MCU, default

# [temperature_sensor Box]          # enclosure temperature; requires adding a temperature sensor, reference configuration
# sensor_type: ATC Semitec 104GT-2  # sensor type
# sensor_pin: PA4                   # signal port

#####################################################################
#             X/Y stepper settings (X/Y Stepper Settings)                 #
#####################################################################
#   B Motor ---- Motor A
#   |                  |
#   |------extruder-------|
#   |                  |
#   |                  |
#          front
#####################################################################
#                  X-axis stepper motor (B Motor)                            #
#####################################################################
[stepper_x]
step_pin: PB9                       # X-axis motor step pin
dir_pin: PE0                        # X-axis motor direction pin; verify direction on your machine, ! reverses direction
enable_pin: !PE1                    # X-axis motor enable pin; enable pins require ! or the motor will not work
rotation_distance: 40               # drive pulley circumference in mm; 2GT-20T is 40, 2GT-16T is 32
microsteps: 32                      # motor microstep setting; higher microsteps improve quality but increase controller load
full_steps_per_rotation: 200        # full steps per motor revolution; 1.8-degree motor: 200, 0.9-degree motor: 400
endstop_pin: PF1                    # physical X endstop pin
position_min: -5                   # minimum X-axis travel
position_endstop: 240              # endstop position
position_max: 240                  # maximum X-axis travel
homing_speed: 80                   # homing speed; maximum is 100
homing_retract_dist: 5             # retract distance after first homing-switch trigger
#--------------------------------------------------------------------
[tmc2209 stepper_x]                 # X driver configuration - TMC2209
uart_pin: PG13                      # UART port pin definition
interpolate: False                  # whether to enable 256-microstep interpolation; disabling is recommended, True enables and False disables
run_current: 1.2                   # motor run current, mA
sense_resistor: 0.110               # do not change the driver sense resistor
#stealthchop_threshold: 100          # stealthChop threshold; set to 0 if quiet mode is not needed
#####################################################################
#                  Y-axis stepper motor (A Motor)                            #
#####################################################################
[stepper_y]
step_pin: PB8                       # Y-axis motor step pin
dir_pin: PG11                      # Y-axis motor direction pin; verify direction on your machine, ! reverses direction
enable_pin: !PG12                   # Y-axis motor enable pin; enable pins require ! or the motor will not work
rotation_distance: 40               # drive pulley circumference in mm; 2GT-20T is 40, 2GT-16T is 32
microsteps: 32                      # motor microstep setting; higher microsteps improve quality but increase controller load
full_steps_per_rotation: 200        # full steps per motor revolution; 1.8-degree motor: 200, 0.9-degree motor: 400
endstop_pin: PC2
position_min: -33                   # minimum Y-axis travel
position_endstop: 230               # endstop position
position_max: 230                   # maximum Y-axis travel
homing_speed: 80                    # homing speed; maximum is 100
homing_retract_dist: 5              # retract distance after first homing-switch trigger 5
#--------------------------------------------------------------------
[tmc2209 stepper_y]                 # Y driver configuration - TMC2209
uart_pin: PG10                      # UART port pin definition
interpolate: False                  # whether to enable 256-microstep interpolation
run_current: 1.2                    # motor run current, mA
sense_resistor: 0.110               # do not change the driver sense resistor
#stealthchop_threshold: 100          # stealthChop threshold; set to 0 if quiet mode is not needed
#####################################################################
#                           Z-axis stepper motor                              #
#####################################################################
##    Z stepper motor - front left
[stepper_z]
step_pin: PC6                 # Z-axis motor step pin
dir_pin:  !PA15              # Z-axis motor direction pin; verify direction on your machine, ! reverses direction
enable_pin: !PD0              # Z-axis motor enable pin; enable pins require ! or the motor will not work
rotation_distance: 8          # lead screw lead is 8; adjust for your setup, three places must be changed in total
full_steps_per_rotation: 200  # full steps per motor revolution; 1.8-degree motor: 200, 0.9-degree motor: 400)
microsteps: 32                # motor microstep setting; higher microsteps improve quality but increase controller load
endstop_pin: probe:z_virtual_endstop            # endstop pin; normally-closed is recommended, add ! to invert, position io-1
position_min: -10             # minimum Z-axis travel; nozzle-cleaning setups usually need about -5
position_max: 200             # maximum Z-axis travel
homing_speed: 10               # homing speed, maximum 20
second_homing_speed: 3        # second homing speed, maximum 10
homing_retract_dist: 3        # retract distance
#--------------------------------------------------------------------
[tmc2208 stepper_z]
uart_pin: PA14                # driver UART port
interpolate: false            # 256-microstep interpolation
run_current: 0.8              # run current, mA
sense_resistor: 0.110         # do not change the driver sense resistor
#--------------------------------------------------------------------
##    Z1 stepper motor - rear
[stepper_z1]
step_pin: PC7                # Z1-axis motor step pin
dir_pin:  !PD3              # Z1-axis motor direction pin; verify direction on your machine, ! reverses direction
enable_pin: !PD4             # Z1-axis motor enable pin; enable pins require ! or the motor will not work
rotation_distance: 8          # lead screw lead is 8
full_steps_per_rotation: 200  # full steps per motor revolution; 1.8-degree motor: 200, 0.9-degree motor: 400
microsteps: 32                # motor microstep setting; higher microsteps improve quality but increase controller load
#--------------------------------------------------------------------
[tmc2208 stepper_z1]
uart_pin: PD1               # driver UART port
interpolate: false            # 256-microstep interpolation
run_current: 0.8              # run current, mA
sense_resistor: 0.110         # do not change the driver sense resistor
#--------------------------------------------------------------------
##    Z2 stepper motor - front right
[stepper_z2]
step_pin: PA8                 # Z2-axis motor step pin
dir_pin: !PD6                # Z2-axis motor direction pin; verify direction on your machine, ! reverses direction
enable_pin: !PD7             # Z2-axis motor enable pin; enable pins require ! or the motor will not work
rotation_distance: 8          # lead screw lead is 8
full_steps_per_rotation: 200  # full steps per motor revolution; 1.8-degree motor: 200, 0.9-degree motor: 400
microsteps: 32                # motor microstep setting; higher microsteps improve quality but increase controller load
#--------------------------------------------------------------------
[tmc2208 stepper_z2]
uart_pin: PD5                 # driver UART port
interpolate: false            # 256-microstep interpolation
run_current: 0.8              # run current, mA
sense_resistor: 0.110         # do not change the driver sense resistor
#####################################################################
#                     E0 extruder settings （E0 Settings）                   #
#####################################################################

[extruder]
step_pin: PD15                      # extruder motor step pin
dir_pin: PG7                        # extruder motor direction pin
enable_pin: !PG8                    # extruder motor enable pin
rotation_distance: 55               # rotation distance value
gear_ratio: 44:10, 37:17            # gear ratio; Galileo is 7.5:1 and this line should be commented out; BMG is 50:17, output shaft front, input shaft rear
microsteps: 32                      # motor microstep setting; higher microsteps improve quality but increase controller load
full_steps_per_rotation: 200        # full steps per revolution; 200 for 1.8 degrees, 400 for 0.9 degrees
nozzle_diameter: 0.400              # nozzle diameter
filament_diameter: 1.75             # filament diameter
heater_pin: PF7                     # heater cartridge pin
sensor_type: ATC Semitec 104GT-2    # sensor type  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: PA0                     # sensor pin, connected to ADC_0
min_temp: -273                      # minimum temperature; note that measured temperature outside the configured range triggers emergency stop
max_temp: 350                       # maximum temperature; note that measured temperature outside the configured range triggers emergency stop
max_power: 1.0                      # maximum power
min_extrude_temp: -273              # minimum extrusion temperature
#nozzle temperature PID calibration command：  "PID_CALIBRATE HEATER=extruder TARGET=245
#control = pid                # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kp = 26.213              # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_ki = 1.304               # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kd = 131.721             # PID nozzle temperature auto-calibration item; commented after PID calibration completes

#--------------------------------------------------------------------
[tmc2208 extruder]                  # extruder driver configuration
uart_pin: PG6                      # UART port pin definition
interpolate: False                  # whether to enable 256-microstep interpolation; True enables and False disables
run_current: 0.8                    # motor run current
sense_resistor: 0.110               # do not change the driver sense resistor
#stealthchop_threshold: 500          # stealthChop threshold; not recommended for the extruder, set to 0 if quiet mode is not needed

#####################################################################
#                     E1 extruder settings （E1 Settings）                   #
#####################################################################

[extruder1]
nozzle_diameter: 0.400              # nozzle diameter
filament_diameter: 1.75             # filament diameter
heater_pin: PF6                     # heater cartridge pin
sensor_type: ATC Semitec 104GT-2    # sensor type  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: PC1                     # sensor pin, connected to ADC_0
min_temp: -273                      # minimum temperature; note that measured temperature outside the configured range triggers emergency stop
max_temp: 350                       # maximum temperature; note that measured temperature outside the configured range triggers emergency stop
max_power: 1.0                      # maximum power
min_extrude_temp: 180               # minimum extrusion temperature; the extruder can extrude only after reaching this temperature
#nozzle temperature PID calibration command：  "PID_CALIBRATE HEATER=extruder1 TARGET=245
#control = pid                # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kp = 26.213              # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_ki = 1.304               # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kd = 131.721             # PID nozzle temperature auto-calibration item; commented after PID calibration completes

#####################################################################
#                     E2 extruder settings （E2 Settings）                   #
#####################################################################

[extruder2]
nozzle_diameter: 0.400              # nozzle diameter
filament_diameter: 1.75             # filament diameter
heater_pin: PE6                     # heater cartridge pin
sensor_type: ATC Semitec 104GT-2    # sensor type  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: PC0                     # sensor pin, connected to ADC_0
min_temp: -273                      # minimum temperature; note that measured temperature outside the configured range triggers emergency stop
max_temp: 350                       # maximum temperature; note that measured temperature outside the configured range triggers emergency stop
max_power: 1.0                      # maximum power
min_extrude_temp: 180               # minimum extrusion temperature; the extruder can extrude only after reaching this temperature
#nozzle temperature PID calibration command：  "PID_CALIBRATE HEATER=extruder2 TARGET=245
#control = pid                # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kp = 26.213              # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_ki = 1.304               # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kd = 131.721             # PID nozzle temperature auto-calibration item; commented after PID calibration completes

#####################################################################
#                     E3 extruder settings （E3 Settings）                   #
#####################################################################

[extruder3]
nozzle_diameter: 0.400              # nozzle diameter
filament_diameter: 1.75             # filament diameter
heater_pin: PE5                     # heater cartridge pin
sensor_type: ATC Semitec 104GT-2    # sensor type  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: PF10                    # sensor pin, connected to ADC_0
min_temp: -273                      # minimum temperature; note that measured temperature outside the configured range triggers emergency stop
