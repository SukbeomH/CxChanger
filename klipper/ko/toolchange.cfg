[save_variables]
filename: ~/printer_data/config/myvariables.cfg

#=================================================
# 시작 시 마지막으로 기록된 툴 상태 복원
#=================================================
[delayed_gcode RESTORE_TOOL_STATUS]
initial_duration: 0.1
gcode:
    {% set svv = printer.save_variables.variables %}
    {% if svv.current_tool is defined %}
        SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=current_tool VALUE={svv.current_tool}
        M118 [시작] 이전 툴 상태를 복원했습니다: T{svv.current_tool}
    {% else %}
        M118 [시작] 저장된 툴 상태가 없어 툴 없음 상태로 시작합니다
    {% endif %}
#=================================================
# 1. 파라미터 중앙 관리
#=================================================
[gcode_macro _toolchanger_cfg]
description: 툴 교체 파라미터 설정

# --- 툴체인지 상승, 속도, 가속도 ---
variable_z_hop:            0.4    # 툴체인지 중 Z축 상승 높이(mm)
variable_feed_z:           600    # Z축 상승 속도(mm/min)
variable_feed_fast:        24000  # 빠른 공회전 이동 속도(mm/min)
variable_feed_slow:        5000   # 부하/정렬 이동 속도(mm/min)
variable_accel_toolchange: 15000  # 툴체인지 중 가속도

# --- 툴체인지 리트랙트/프라임 설정 ---
variable_swap_retract_len: 0      # 툴을 도크에 반납할 때의 리트랙션 양(mm)
variable_swap_prime_len:   0      # 픽업 후 프라임/보정 압출량(mm)
variable_swap_retract_spd: 2000   # 압출/리트랙션 이송 속도(mm/min)

# ========================================================
# 【도크 이동 로직 파라미터】
# ========================================================
variable_dock_shift_x: -3     # 익스트루더 아이들러를 여닫는 X축 횡이동 거리
variable_dock_dodge_y: 14     # 회피 동작의 Y축 상대 이동량
variable_dock_safe_y:  22     # 안전하게 빼내기 위한 Y축 상대 이동량

#---------------------------------------------------------
# 각 핫엔드 모듈의 절대 도크 좌표(실제 장비에 맞게 조정)
#---------------------------------------------------------
# T0 설정
variable_t0_dock_x: 232
variable_t0_dock_y: -20

# T1 설정
variable_t1_dock_x: 202
variable_t1_dock_y: -20

# T2 설정
variable_t2_dock_x: 172
variable_t2_dock_y: -20

# T3 설정
variable_t3_dock_x: 142
variable_t3_dock_y: -20
gcode:
    # 변수 저장 전용이며 실행할 명령은 없습니다.

#=================================================
# 2. 사용자용 툴 교체 명령
#=================================================
[gcode_macro T0]
gcode: change_tool T=0

[gcode_macro T1]
gcode: change_tool T=1

[gcode_macro T2]
gcode: change_tool T=2

[gcode_macro T3]
gcode: change_tool T=3

[gcode_macro UNTOOL]
description: 활성 핫엔드 모듈을 주차하고 툴헤드를 빈 상태로 전환
gcode: change_tool T=-1

#=================================================
# 3. 현재 집은 툴을 기록하는 상태 변수
#=================================================
[gcode_macro _tool_status]
variable_current_tool: -1
gcode:

#=================================================
# 4. 활성 툴 주차(핫엔드 모듈을 도크로 복귀)
#=================================================
[gcode_macro _release_tool]
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set active_extruder = printer.toolhead.extruder %}

    # 현재 노즐의 기준 좌표와 상대 이동량 가져오기
    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    M118 --- [T{tool} 릴리스] 릴리스 절차를 시작합니다...

    # --- [A] 릴리스 리트랙트, 도크 누출 방지 ---
    {% set cur_temp = printer[active_extruder].temperature|float %}
    {% set min_temp = printer.configfile.settings[active_extruder].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp %}
       M118 --- [T{tool} 릴리스] 온도가 충분합니다. 릴리스 전 리트랙션을 수행합니다...
       M83
       G1 E-{cfg.swap_retract_len} F{cfg.swap_retract_spd}
    {% else %}
       M118 --- [T{tool} 릴리스] 현재 온도({cur_temp} C)가 낮아 리트랙션을 건너뜁니다
    {% endif %}

    # --- 물리적 릴리스 동작 시작 ---
    G90
    M118 --- [T{tool} 릴리스] 1단계: 안전한 도크 입구로 이동합니다
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}

    M118 --- [T{tool} 릴리스] 2단계: 도크 안으로 직선 진입합니다
    G0 X{dock_x} Y{dock_y} F{cfg.feed_fast}

    M118 --- [T{tool} 릴리스] 3단계: X축으로 이동해 익스트루더 아이들러를 엽니다
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}

    M118 --- [T{tool} 릴리스] 4단계: Y축으로 빠져나와 자석 결합을 해제합니다
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow}

    M118 --- [T{tool} 릴리스] 5단계: 반대로 이동해 익스트루더 아이들러를 닫습니다
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_slow}

    M118 --- [T{tool} 릴리스] 6단계: 안전 입구로 복귀합니다. 릴리스가 완료되었습니다
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}

#=================================================
# 5. 툴 픽업(핫엔드 모듈 결합)
#=================================================
[gcode_macro _pickup_tool]
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set current_heater = "extruder" if tool == 0 else ("extruder" ~ tool) %}

    # 현재 노즐의 기준 좌표와 상대 이동량 가져오기
    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    M118 +++ [T{tool} 픽업] 픽업 절차를 시작합니다...

    # --- 물리적 픽업 동작 시작 ---
    G90
    M118 +++ [T{tool} 픽업] 1단계: 안전한 도크 입구로 이동합니다
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}

    M118 +++ [T{tool} 픽업] 2단계: 충돌 회피 위치로 진입합니다
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_fast}

    M118 +++ [T{tool} 픽업] 3단계: X축으로 이동해 진입을 준비합니다
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow}

    M118 +++ [T{tool} 픽업] 4단계: 도크 안으로 진입해 자석을 결합합니다
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}

    M118 +++ [T{tool} 픽업] 5단계: 반대로 이동해 필라멘트를 고정합니다
    G0 X{dock_x} Y{dock_y} F{cfg.feed_slow}

    # --- 도크 내부 압출 보정 ---
    {% set cur_temp = printer[current_heater].temperature|float %}
    {% set min_temp = printer.configfile.settings[current_heater].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp %}
         M118 +++ [T{tool} 픽업] 온도가 충분합니다. 픽업 보정 압출을 수행합니다...
         M83
         G1 E{cfg.swap_prime_len} F{cfg.swap_retract_spd}
    {% else %}
         M118 +++ [T{tool} 픽업] 현재 온도({cur_temp} C)가 낮아 보정 압출을 건너뜁니다
    {% endif %}

    M118 +++ [T{tool} 픽업] 6단계: 안전 입구로 복귀합니다. 픽업이 완료되었습니다
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}

#=================================================
# 6. 주 툴 교체 디스패처
#=================================================
[gcode_macro change_tool]
gcode:
    {% set new_tool = params.T|default(-1)|int %}
    {% set old_tool = printer["gcode_macro _tool_status"].current_tool|int %}
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}

    {% if new_tool == old_tool %}
        M118 [툴 교체] 목표 툴이 현재 툴과 같습니다(T{new_tool}). 동작이 필요 없습니다
    {% else %}
        {% if new_tool == -1 %}
            M118 [툴 교체] 언로드 요청: T{old_tool}를 도크로 반납합니다...
        {% else %}
            M118 [툴 교체] T{old_tool}에서 T{new_tool}로 전환합니다
        {% endif %}

        # 1. 현재 상태를 저장하고 툴 교체 가속도를 적용
        M118 [툴 교체] 좌표를 저장하고 툴 교체 가속도를 적용합니다...
        SAVE_GCODE_STATE NAME=tool_change
        {% set saved_accel = printer.toolhead.max_accel %}
        SET_VELOCITY_LIMIT ACCEL={cfg.accel_toolchange}

        # 2. Z축 상승
        M118 [툴 교체] Z축을 {cfg.z_hop} mm 올립니다...
        G91
        G0 Z{cfg.z_hop} F{cfg.feed_z}
        G90

        # 3. 오프셋을 초기화하고 절대 기계 좌표 사용
        M118 [툴 교체] 좌표 오프셋을 임시로 초기화합니다...
        SET_GCODE_OFFSET X=0 Y=0 Z=0

        # 4. 이전 툴 릴리스
        {% if old_tool != -1 %}
            _release_tool TOOL={old_tool}
        {% else %}
            M118 [툴 교체] 툴헤드가 이미 비어 있어 릴리스를 건너뜁니다
        {% endif %}

        # 5. 새 툴 픽업
        {% if new_tool != -1 %}
            {% set next_heater = "extruder" if new_tool == 0 else ("extruder" ~ new_tool) %}
            {% set target_temp = printer[next_heater].target|float %}
            {% if target_temp > 0 %}
                {% if printer[next_heater].temperature < (target_temp - 2) %}
                    M118 [툴 교체] T{new_tool} 온도가 낮아 {target_temp} C까지 기다립니다...
                    TEMPERATURE_WAIT SENSOR={next_heater} MINIMUM={target_temp}
                {% endif %}
            {% endif %}

            _pickup_tool TOOL={new_tool}
        {% else %}
            M118 [툴 교체] 목표가 언로드 상태(-1)이므로 픽업을 건너뜁니다
        {% endif %}

        # 6. 런타임 상태 업데이트
        SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=current_tool VALUE={new_tool}

        # 7. 저장한 상태와 가속도 복원
        M118 [툴 교체] 툴 교체 전 좌표와 가속도를 복원합니다...
        RESTORE_GCODE_STATE NAME=tool_change MOVE=0
        SET_VELOCITY_LIMIT ACCEL={saved_accel}

        # 8. 새 툴 오프셋 읽기 및 적용
        {% set svv = printer.save_variables.variables %}
        {% if new_tool != -1 %}
            {% set off_x = svv["t" ~ new_tool ~ "_offset_x"] | default(0.0) | float %}
            {% set off_y = svv["t" ~ new_tool ~ "_offset_y"] | default(0.0) | float %}
            {% set off_z = svv["t" ~ new_tool ~ "_offset_z"] | default(0.0) | float %}

            SET_GCODE_OFFSET X={off_x} Y={off_y} Z={off_z} MOVE=0
            M118 [툴 교체] T{new_tool} 오프셋을 불러왔습니다: X={off_x} Y={off_y} Z={off_z}
        {% endif %}

        # 9. 누적 횟수와 현재 상태를 영구 저장
        {% set total_changes = svv.total_tool_changes | default(0) | int + 1 %}
        SAVE_VARIABLE VARIABLE=total_tool_changes VALUE={total_changes}
        SAVE_VARIABLE VARIABLE=current_tool VALUE={new_tool}
        M118 [툴 교체] 완료. 누적 툴 교체 횟수: {total_changes}
    {% endif %}

#=================================================
# 7. 툴 교체 횟수 관리 명령
#=================================================
[gcode_macro GET_TOOL_CHANGE_COUNT]
description: 누적 툴 교체 횟수 조회
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set total_changes = svv.total_tool_changes | default(0) | int %}
    M118 [툴 교체 횟수] 누적 툴 교체 횟수: {total_changes}

[gcode_macro RESET_TOOL_CHANGE_COUNT]
description: 누적 툴 교체 횟수를 0으로 초기화
gcode:
    SAVE_VARIABLE VARIABLE=total_tool_changes VALUE=0
    M118 [툴 교체 횟수] 누적 횟수를 0으로 초기화했습니다

#=================================================
# 8. M109 재정의(가열 후 대기)
#=================================================
[gcode_macro M109]
rename_existing: M99109
gcode:
    {% set s = params.S|default(0)|float %}
    {% set r = params.R|default(0)|float %}
    {% set target_temp = s if s > 0 else r %}
    {% set tool_index = params.T|default(-1)|int %}
    {% set sensor_name = printer.toolhead.extruder %}

    # T 파라미터가 없으면 현재 장착된 툴을 대상으로 지정
    {% if tool_index == -1 %}
        {% set current_tool = printer["gcode_macro _tool_status"].current_tool|int %}
        {% set tool_index = current_tool %}
        M118 [M109] T 파라미터가 없어 현재 툴 T{current_tool}을 가열합니다
    {% endif %}

    {% if tool_index != -1 %}
        {% if tool_index == 0 %}
            {% set sensor_name = "extruder" %}
        {% else %}
            {% set sensor_name = "extruder" ~ tool_index %}
        {% endif %}
    {% endif %}

    {% if target_temp > 0 %}
        M118 [M109] {sensor_name}을 {target_temp} C까지 가열하고 기다립니다...
        {% if tool_index != -1 %}
            M104 S{target_temp} T{tool_index}
        {% else %}
            M104 S{target_temp}
        {% endif %}
        TEMPERATURE_WAIT SENSOR={sensor_name} MINIMUM={target_temp - 1.0}
        M118 [M109] 목표 온도에 도달했습니다
    {% endif %}
