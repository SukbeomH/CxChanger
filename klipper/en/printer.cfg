#####################################################################
#                               File includes                               #
#####################################################################
[include fluidd.cfg]          # FLUIDD include file.
#[include mainsail.cfg]        # MAINSAIL include file.
[include toolchange.cfg]
[include calibration.cfg]
#[include plr.cfg]
#####################################################################
#                               Mainboard configuration                               #
#####################################################################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_12345-if00
[mcu host]
serial: /tmp/klipper_host_mcu

#####################################################################
#                            Expansion board configuration                             #
#####################################################################
[mcu expander]
# Enter the new board ID obtained in the first step here
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_3F0035000357465036383420-if00
#####################################################################
#                            Printer model and acceleration                            #
#####################################################################
[printer]                       # printer settings
kinematics: corexy              # kinematics type, such as Cartesian or CoreXY; Cartesian uses cartesian
max_velocity: 600               # maximum printer speed
max_accel: 30000                 # maximum acceleration
max_z_velocity: 30              # maximum Z-axis speed
max_z_accel: 300                # maximum Z-axis acceleration
square_corner_velocity: 5.0     # square-corner velocity; a smaller value helps reduce inertia from a heavy bed
#####################################################################
#                             Temperature monitoring                               #
#####################################################################
[temperature_sensor FLY-Pi]
sensor_type: temperature_host

#[temperature_sensor Fly-C8p]     # FLY mainboard temperature, rename if desired
#sensor_type: temperature_mcu     # associated MCU, default

# [temperature_sensor Box]          # enclosure temperature; requires adding a temperature sensor, reference configuration
# sensor_type: ATC Semitec 104GT-2  # sensor type
# sensor_pin: PA4                   # signal port

#####################################################################
#             X/Y stepper settings (X/Y Stepper Settings)                 #
#####################################################################
#   B Motor ---- Motor A
#   |                  |
#   |------extruder-------|
#   |                  |
#   |                  |
#          front
#####################################################################
#                  X-axis stepper motor (B Motor)                            #
#####################################################################
[stepper_x]
step_pin: PE5                       # X-axis motor step pin
dir_pin: !PA8                        # X-axis motor direction pin; verify direction on your machine, ! reverses direction
enable_pin: !PA15                   # X-axis motor enable pin; enable pins require ! or the motor will not work
rotation_distance: 40               # drive pulley circumference in mm; 2GT-20T is 40, 2GT-16T is 32
microsteps: 64                      # motor microstep setting; higher microsteps improve quality but increase controller load
full_steps_per_rotation: 200        # full steps per motor revolution; 1.8-degree motor: 200, 0.9-degree motor: 400
endstop_pin:tmc2209_stepper_x:virtual_endstop                   # endstop pin; normally-closed is recommended, add ! to invert, position io-3 !PB3
position_min: -10                     # minimum X-axis travel
position_endstop: 245            # endstop position (250mm-300mm-350mm)
position_max: 245                   # maximum X-axis travel (250mm-300mm-350mm)
homing_speed: 50                    # homing speed; maximum is 100, avoid homing too fast
homing_retract_dist: 0              # retract distance after first homing-switch trigger
#--------------------------------------------------------------------
[tmc2209 stepper_x]                 # X driver configuration - TMC2209
uart_pin: PC9                       # UART port pin definition
interpolate: False                  # whether to enable 256-microstep interpolation; disabling is recommended, True enables and False disables
run_current: 1.2                   # motor run current, mA
sense_resistor: 0.110               # do not change the driver sense resistor
driver_SGTHRS:90
diag_pin:^PD9
#stealthchop_threshold: 100          # stealthChop threshold; set to 0 if quiet mode is not needed
#####################################################################
#                  Y-axis stepper motor (A Motor)                            #
#####################################################################
[stepper_y]
step_pin: PE4                       # Y-axis motor step pin
dir_pin: PC11                      # Y-axis motor direction pin; verify direction on your machine, ! reverses direction
enable_pin: !PC12                   # Y-axis motor enable pin; enable pins require ! or the motor will not work
rotation_distance: 40               # drive pulley circumference in mm; 2GT-20T is 40, 2GT-16T is 32
microsteps: 64                      # motor microstep setting; higher microsteps improve quality but increase controller load
full_steps_per_rotation: 200        # full steps per motor revolution; 1.8-degree motor: 200, 0.9-degree motor: 400
endstop_pin:^!PD10
position_min: -33                   # minimum Y-axis travel
position_endstop: 229               # endstop position (250mm-300mm-350mm)
position_max: 229                   # maximum Y-axis travel (250mm-300mm-350mm)
homing_speed: 50                    # homing speed; maximum is 100, avoid homing too fast
homing_retract_dist: 5              # retract distance after first homing-switch trigger 5
#--------------------------------------------------------------------
[tmc2209 stepper_y]                 # Y driver configuration - TMC2209
uart_pin: PC10                      # UART port pin definition
interpolate: false                  # whether to enable 256-microstep interpolation; disabling is recommended, True enables and False disables
run_current: 1.2                    # motor run current, mA
sense_resistor: 0.110               # do not change the driver sense resistor
diag_pin:^PD8
#stealthchop_threshold: 100          # stealthChop threshold; set to 0 if quiet mode is not needed
#####################################################################
#                           Z-axis stepper motor                              #
#####################################################################
##    Z stepper motor - front left
[stepper_z]
step_pin: PE3                 # Z-axis motor step pin
dir_pin:  !PD1                 # Z-axis motor direction pin; verify direction on your machine, ! reverses direction
enable_pin: !PD2               # Z-axis motor enable pin; enable pins require ! or the motor will not work
rotation_distance: 8          # lead screw lead is 8; adjust for your setup, three places must be changed in total
full_steps_per_rotation: 200  # full steps per motor revolution; 1.8-degree motor: 200, 0.9-degree motor: 400)
microsteps: 64                # motor microstep setting; higher microsteps improve quality but increase controller load
endstop_pin: probe:z_virtual_endstop            # endstop pin; normally-closed is recommended, add ! to invert, position io-1
position_min: -10             # minimum Z-axis travel; nozzle-cleaning setups usually need about -5
position_max: 100             # maximum Z-axis travel (250mm-300mm-350mm)
homing_speed: 10               # homing speed, maximum 20
second_homing_speed: 3        # second homing speed, maximum 10
homing_retract_dist: 3        # retract distance
#--------------------------------------------------------------------
[tmc2208 stepper_z]
uart_pin: PD0                 # driver UART port
interpolate: false            # 256-microstep interpolation
run_current: 0.8              # run current, mA
sense_resistor: 0.110         # do not change the driver sense resistor
stealthchop_threshold: 500    # stealthChop threshold; set to 0 if quiet mode is not needed
#--------------------------------------------------------------------
##    Z1 stepper motor - rear
[stepper_z1]
step_pin: PE2                # Z1-axis motor step pin
dir_pin:  !PD4               # Z1-axis motor direction pin; verify direction on your machine, ! reverses direction
enable_pin: !PD5              # Z1-axis motor enable pin; enable pins require ! or the motor will not work
rotation_distance: 8          # lead screw lead is 8
full_steps_per_rotation: 200  # full steps per motor revolution; 1.8-degree motor: 200, 0.9-degree motor: 400
microsteps: 64                # motor microstep setting; higher microsteps improve quality but increase controller load
#--------------------------------------------------------------------
[tmc2208 stepper_z1]
uart_pin: PD3               # driver UART port
interpolate: false            # 256-microstep interpolation
run_current: 0.8              # run current, mA
sense_resistor: 0.110         # do not change the driver sense resistor
stealthchop_threshold: 500    # stealthChop threshold; set to 0 if quiet mode is not needed
#--------------------------------------------------------------------
##    Z2 stepper motor - front right
[stepper_z2]
step_pin: PE7                 # Z2-axis motor step pin
dir_pin: !PE11               # Z2-axis motor direction pin; verify direction on your machine, ! reverses direction
enable_pin: !PE10             # Z2-axis motor enable pin; enable pins require ! or the motor will not work
rotation_distance: 8          # lead screw lead is 8
full_steps_per_rotation: 200  # full steps per motor revolution; 1.8-degree motor: 200, 0.9-degree motor: 400
microsteps: 64                # motor microstep setting; higher microsteps improve quality but increase controller load
#--------------------------------------------------------------------
[tmc2208 stepper_z2]
uart_pin: PC15                # driver UART port
interpolate: false            # 256-microstep interpolation
run_current: 0.8              # run current, mA
sense_resistor: 0.110         # do not change the driver sense resistor
stealthchop_threshold: 500    # stealthChop threshold; set to 0 if quiet mode is not needed
#####################################################################
#                     E0 extruder settings （E0 Settings）                   #
#####################################################################

[extruder]
step_pin: PE0                       # extruder motor step pin
dir_pin: PC13                       # extruder motor direction pin
enable_pin: !PC14                   # extruder motor enable pin
rotation_distance: 55               # rotation distance value
gear_ratio: 44:10, 37:17            # gear ratio; Galileo is 7.5:1 and this line should be commented out; BMG is 50:17, output shaft front, input shaft rear
microsteps: 32                      # motor microstep setting; higher microsteps improve quality but increase controller load
full_steps_per_rotation: 200        # full steps per revolution; 200 for 1.8 degrees, 400 for 0.9 degrees
nozzle_diameter: 0.400              # nozzle diameter
filament_diameter: 1.75             # filament diameter
heater_pin: expander:PB12           # heater cartridge pin
sensor_type: ATC Semitec 104GT-2    # sensor type  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: expander:PC0            # sensor pin, connected to ADC_0
min_temp: -273                      # minimum temperature; note that measured temperature outside the configured range triggers emergency stop
max_temp: 350                       # maximum temperature; note that measured temperature outside the configured range triggers emergency stop
max_power: 1.0                      # maximum power
min_extrude_temp: 0                 # minimum extrusion temperature; the extruder can extrude only after reaching this temperature
#nozzle temperature PID calibration command：  "PID_CALIBRATE HEATER=extruder TARGET=245
#control = pid                # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kp = 26.213              # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_ki = 1.304               # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kd = 131.721             # PID nozzle temperature auto-calibration item; commented after PID calibration completes

#--------------------------------------------------------------------
[tmc2208 extruder]                  # extruder driver configuration
uart_pin: PB7                      # UART port pin definition
interpolate: False                  # whether to enable 256-microstep interpolation; True enables and False disables
run_current: 0.8                    # motor run current
sense_resistor: 0.110               # do not change the driver sense resistor
#stealthchop_threshold: 500          # stealthChop threshold; not recommended for the extruder, set to 0 if quiet mode is not needed

#####################################################################
#                     E1 extruder settings （E1 Settings）                   #
#####################################################################

[extruder1]
nozzle_diameter: 0.400              # nozzle diameter
filament_diameter: 1.75             # filament diameter
heater_pin: expander:PC6            # heater cartridge pin
sensor_type: ATC Semitec 104GT-2    # sensor type  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: expander:PC1            # sensor pin, connected to ADC_0
min_temp: -273                      # minimum temperature; note that measured temperature outside the configured range triggers emergency stop
max_temp: 350                       # maximum temperature; note that measured temperature outside the configured range triggers emergency stop
max_power: 1.0                      # maximum power
min_extrude_temp: 180               # minimum extrusion temperature; the extruder can extrude only after reaching this temperature
#nozzle temperature PID calibration command：  "PID_CALIBRATE HEATER=extruder1 TARGET=245
#control = pid                # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kp = 26.213              # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_ki = 1.304               # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kd = 131.721             # PID nozzle temperature auto-calibration item; commented after PID calibration completes

#####################################################################
#                     E2 extruder settings （E2 Settings）                   #
#####################################################################

[extruder2]
nozzle_diameter: 0.400              # nozzle diameter
filament_diameter: 1.75             # filament diameter
heater_pin: expander:PC7            # heater cartridge pin
sensor_type: ATC Semitec 104GT-2    # sensor type  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: expander:PC2            # sensor pin, connected to ADC_0
min_temp: -273                      # minimum temperature; note that measured temperature outside the configured range triggers emergency stop
max_temp: 350                       # maximum temperature; note that measured temperature outside the configured range triggers emergency stop
max_power: 1.0                      # maximum power
min_extrude_temp: 180               # minimum extrusion temperature; the extruder can extrude only after reaching this temperature
#nozzle temperature PID calibration command：  "PID_CALIBRATE HEATER=extruder2 TARGET=245
#control = pid                # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kp = 26.213              # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_ki = 1.304               # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kd = 131.721             # PID nozzle temperature auto-calibration item; commented after PID calibration completes

#####################################################################
#                     E3 extruder settings （E3 Settings）                   #
#####################################################################

[extruder3]
nozzle_diameter: 0.400              # nozzle diameter
filament_diameter: 1.75             # filament diameter
heater_pin: PD12                    # heater cartridge pin
sensor_type: ATC Semitec 104GT-2    # sensor type  (#Generic 3950, ATC Semitec 104GT-2， PT1000)
sensor_pin: PC4                     # sensor pin, connected to ADC_0
min_temp: -273                      # minimum temperature; note that measured temperature outside the configured range triggers emergency stop
max_temp: 350                       # maximum temperature; note that measured temperature outside the configured range triggers emergency stop
max_power: 1.0                      # maximum power
min_extrude_temp: 180               # minimum extrusion temperature; the extruder can extrude only after reaching this temperature
#nozzle temperature PID calibration command：  "PID_CALIBRATE HEATER=extruder3 TARGET=245
#control = pid                # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kp = 26.213              # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_ki = 1.304               # PID nozzle temperature auto-calibration item; commented after PID calibration completes
#pid_kd = 131.721             # PID nozzle temperature auto-calibration item; commented after PID calibration completes

#####################################################################
#                            heated bed configuration                                #
#####################################################################

[heater_bed]
heater_pin: PB0              # heated bed port
sensor_type: Generic 3950    # heated bed sensor type
sensor_pin:  PC5             # heated bed sensor port
max_power: 1.0               # heated bed power
min_temp: -273                  # minimum temperature; note that measured temperature outside the configured range triggers emergency stop
max_temp: 100                # maximum temperature; note that measured temperature outside the configured range triggers emergency stop
# heated bed temperature PID calibration command：  "PID_CALIBRATE HEATER=heater_bed TARGET=100"
#control: pid                # PID heated-bed temperature auto-calibration item; commented after PID calibration completes
#pid_kp: 58.437              # PID heated-bed temperature auto-calibration item; commented after PID calibration completes
#pid_ki: 2.347               # PID heated-bed temperature auto-calibration item; commented after PID calibration completes
#pid_kd: 363.769             # PID heated-bed temperature auto-calibration item; commented after PID calibration completes

#####################################################################
#                            fan configuration                                #
#####################################################################
[fan]                        # part-cooling fan
pin: expander:PC8            # signal port
kick_start_time: 0.5         # startup time; do not change
off_below: 0.10              # do not change
#--------------------------------------------------------------------
[heater_fan hotend_fan]
pin: expander:PC9            # signal port
max_power: 1.0               # maximum speed
kick_start_time: 0.5         # startup time; do not change
heater: extruder,extruder1,extruder2,extruder3             # associated device: extruder
heater_temp: 50              # extruder temperature at which the fan starts
fan_speed: 0.8               # fan speed
#--------------------------------------------------------------------
[heater_fan dock_fan]
pin: PA0                     # signal port
max_power: 1.0               # maximum speed
kick_start_time: 0.5         # startup time; do not change
heater: extruder,extruder1,extruder2,extruder3              # associated device: extruder
heater_temp: 50              # extruder temperature at which the fan starts
fan_speed: 1.0               # fan speed
#--------------------------------------------------------------------

[temperature_fan Fly-C8p_Fan]
pin: PC6
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
off_below: 0.1

sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

# --- temperature-control strategy ---
control: watermark            # watermark mode: runs at target temperature, stops below it
target_temp: 45.0             # start running at 45 degrees
max_delta: 2.0                # stop after temperature drops by 2 degrees

#####################################################################
#                           leveling sensor                               #
#####################################################################
[probe]
pin: ^PA4
x_offset: 2.88                  # X-axis sensor offset relative to nozzle
y_offset: 11.63                 # Y-axis sensor offset relative to nozzle
#z_offset: 5.07              # Z-axis sensor offset relative to nozzle
#PROBE_CALIBRATE, probe calibration
speed: 10                     # leveling speed
samples: 3                   # number of samples
samples_result: median       # sample result method; default median
sample_retract_dist: 3.0     # leveling retract distance
lift_speed:8                # lift speed
samples_tolerance: 0.005     # sample tolerance; too-small values may increase sample count
samples_tolerance_retries: 6 # number of retries after exceeding tolerance

#####################################################################
#                               homing                                #
#####################################################################
[homing_override]
axes: z
set_position_z: 0
gcode:
    G91
    G1 Z10 F600
    G90

    # check whether X is homed; home it if not
    {% if "X" not in printer.toolhead.homed_axes %}
        G28 Y
    {% endif %}

    # check whether X is homed; home it if not
    {% if "X" not in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}

    UNTOOL  # run your tool-unload macro

    # move to the center of the bed for Z homing; adjust X150 Y150 for your bed size
    G0 X{ printer.toolhead.axis_maximum.x/2 } Y{ printer.toolhead.axis_maximum.y/2 } F6000

    # perform actual Z homing
    G28 Z

    # lift slightly after homing
    G1 Z20 F600

#####################################################################
#   3-Z leveling
#####################################################################
[z_tilt]
# z_positions: physical lead-screw coordinates, rotation-center points
# imagine the XY coordinate of the point where the nozzle would be directly above the lead screw.
# Note: these points are usually outside the print area.
z_positions:
    -15, -5           # lead screw 1 (stepper_z)  physical position
    117.5, 255        # lead screw 2 (stepper_z1)  physical position
    250, 10           # lead screw 3 (stepper_z2)  physical position

# points: probe measurement points, where the probe touches the bed
points:
    10, 10            # first measurement point (near the rear-left lead screw)
    117.5, 205        # second measurement point (near the rear-right lead screw)
    225, 10           # third measurement point (near the front-center lead screw)

speed: 400            # move speed between measurements
horizontal_move_z: 10 # lift height before measurement
retries: 6            # allowed retry count until accuracy is reached
retry_tolerance: 0.01 # accuracy requirement
#####################################################################
#                              bed mesh calibration
#####################################################################
[bed_mesh]
speed: 300                   # calibration speed
horizontal_move_z: 10        # Z lift height before the probe moves to the next point
mesh_min: 10,10              # minimum calibration point coordinates, X and Y
mesh_max: 220, 225           # maximum calibration point coordinates, X and Y
probe_count: 5,5             # number of sample points; 4x4 is 16 points
mesh_pps: 2,2                # additional interpolated sample points
algorithm: bicubic           # algorithm model
bicubic_tension: 0.2         # do not change the algorithm interpolation setting

#####################################################################
#                              release hotend before probing
#####################################################################
[gcode_macro Z_TILT_ADJUST]
rename_existing: Z_TILT_ADJUST_BASE
gcode:
    UNTOOL        # first make sure no tool is attached
    Z_TILT_ADJUST_BASE {rawparams}  # then run the original leveling command

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE
gcode:
    UNTOOL        # first make sure no tool is attached
    BED_MESH_CALIBRATE_BASE {rawparams} # then run the original leveling command

#####################################################################
#                           custom G-code macros                            #
#####################################################################

[gcode_macro PRINT_START]
description: Print start macro: homing, leveling, independent material temperatures, and smart purge-line ordering
gcode:
    # ==========================================
    # 1. receive parameters from the slicer
    # ==========================================
    {% set BED_TEMP = params.BED|default(60)|float %}

    # Important: receive the initial tool number and convert it to a string for later comparison
    {% set INITIAL_TOOL = params.INITIAL_TOOL|default("0")|string %}

    {% set tools_str = params.TOOLS|default("0,")|string %}
    {% set tool_list = tools_str.split(',') %}
    {% set temps_str = params.TEMPS|default("200,")|string %}
    {% set temp_list = temps_str.split(',') %}

    {% set start_x = params.START_X|default(100.0)|float %}
    {% set start_y = params.START_Y|default(5.0)|float %}
    {% set offset_y = params.OFFSET_Y|default(5.0)|float %}
    {% set prime_length = params.LENGTH|default(50.0)|float %}
    {% set pre_extrude = params.PRE_EXTRUDE|default(3.0)|float %}

    # ==========================================
    # 2. preheat the bed, home the printer, and level it
    # ==========================================
    BED_MESH_CLEAR
    M140 S{BED_TEMP}
    G28
    Z_TILT_ADJUST
    G28 Z
    G1 Z20 F3000
    BED_MESH_PROFILE LOAD=default
    M190 S{BED_TEMP}

    # ==========================================
    # 3. heat all used tools to their independent temperatures
    # ==========================================
    {% for i in range(tool_list|length) %}
        {% if tool_list[i] != "" and temp_list[i] != "" %}
            M104 S{temp_list[i]} T{tool_list[i]}
        {% endif %}
    {% endfor %}

    {% for i in range(tool_list|length) %}
        {% if tool_list[i] != "" and temp_list[i] != "" %}
            M109 S{temp_list[i]} T{tool_list[i]}
        {% endif %}
    {% endfor %}

    # ==========================================
    # 4. switch tools in sequence and draw edge purge lines
    # ==========================================
    SAVE_GCODE_STATE NAME=print_start_state
    G90
    G92 E0

    {% set ns = namespace(line_index=0) %}

    # ----- Step 1: purge non-initial tools first -----
    {% for tool in tool_list %}
        # if the value is not empty and is not the initial tool, purge it first
        {% if tool != "" and tool != INITIAL_TOOL %}
            T{tool}
            {% set current_y = start_y + (ns.line_index * offset_y) %}
            G1 Z5.0 F3000
            G1 X{start_x} Y{current_y} F6000
            G1 Z0.28 F1500
            G91
            G1 E{pre_extrude} F300
            G1 X{prime_length * 0.6} E{prime_length * 0.12} F1000
            G1 X{prime_length * 0.4} E{prime_length * 0.05} F1500
            G1 E-1.5 F2100
            G1 Z2.0 F3000
            G90
            G92 E0
            M104 S0 T{tool}
            {% set ns.line_index = ns.line_index + 1 %}
        {% endif %}
    {% endfor %}

    # ----- Step 2: purge the initial tool last -----
    # make sure the initial tool from the slicer is in the used-tool list, then pick it up last and purge it
    {% if INITIAL_TOOL in tool_list %}
        T{INITIAL_TOOL}
        {% set current_y = start_y + (ns.line_index * offset_y) %}
        G1 Z5.0 F3000
        G1 X{start_x} Y{current_y} F6000
        G1 Z0.28 F1500
        G91
        G1 E{pre_extrude} F300
        G1 X{prime_length * 0.6} E{prime_length * 0.12} F1000
        G1 X{prime_length * 0.4} E{prime_length * 0.05} F1500
        G1 E0 F2100
        G1 Z2.0 F3000
        G90
        G92 E0
        # after this purge line, the printer is holding the initial tool.
    {% endif %}

   # ==========================================
    # 5. restore state and hand control back to the slicer; fixes first-layer shift bug
    # ==========================================
    RESTORE_GCODE_STATE NAME=print_start_state

    {% if INITIAL_TOOL in tool_list %}
        {% set svv = printer.save_variables.variables %}
        {% set off_x = svv["t" ~ INITIAL_TOOL ~ "_offset_x"] | default(0.0) | float %}
        {% set off_y = svv["t" ~ INITIAL_TOOL ~ "_offset_y"] | default(0.0) | float %}
        {% set off_z = svv["t" ~ INITIAL_TOOL ~ "_offset_z"] | default(0.0) | float %}

        SET_GCODE_OFFSET X={off_x} Y={off_y} Z={off_z} MOVE=0

        { action_respond_info("Initial tool T" ~ INITIAL_TOOL ~ " offset has been applied from the external file.") }
    {% endif %}


    { action_respond_info("Purge lines finished. Current tool is T" ~ INITIAL_TOOL ~ "; coordinate offsets reloaded, ready to print.") }
#--------------------------------------------------------------------
[gcode_macro PRINT_END]
description: Print end macro: unload tool, turn off heaters, and lower the bed for easy part removal
gcode:
    # 1. get the configured printer bounds
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    # 2. unload toolhead and reset offsets
    UNTOOL
    SET_GCODE_OFFSET X=0 Y=0 Z=0

    M400                              # wait for buffer to clear
    G92 E0                            # reset extruder position counter

    # 3. perform a small safe lift first, in relative coordinates
    G91                               # relative positioning
    # lift 5 mm if it does not exceed maximum height
    {% if printer.toolhead.position.z < (max_z - 5) %}
        G0 Z5 F3600
    {% endif %}

    # 4. turn off all heaters and fans
    M104 S0 T0
    M104 S0 T1
    M104 S0 T2
    M104 S0 T3
    M140 S0                           # turn off heated bed
    M106 S0                           # turn off part-cooling fan

    # 5. move to the part-removal position, in absolute coordinates
    G90                               # switch back to absolute coordinates
    {% set safe_z = max_z - 10 %}

    G0 X{max_x} Y{max_y} Z{safe_z} F6000

    # 6. post-processing
    M400                              # wait for movement to complete
    BED_MESH_CLEAR                    # clear bed mesh
    # M84                             # Optional: uncomment this line to disable motors for easier manual part removal

    { action_respond_info("Print complete. The bed has been lowered; remove the part.") }
