[save_variables]
filename: ~/printer_data/config/myvariables.cfg

[delayed_gcode RESTORE_TOOL_STATUS]
initial_duration: 0.1
gcode:
    {% set svv = printer.save_variables.variables %}
    {% if svv.current_tool is defined %}
        SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=current_tool VALUE={svv.current_tool}
        # Optional: add any extra toolchange actions here, such as setting temperature or lifting Z
    {% endif %}
#=================================================
# 1. centralized parameter management
#=================================================
[gcode_macro _toolchanger_cfg]
description: Tool-change parameter configuration

# --- toolchange lift, speed, and acceleration ---
variable_z_hop:            0.4   # toolhead lift height during toolchange
variable_feed_z:           600   # lift speed
variable_feed_fast:        24000 # working speed, travel move
#variable_feed_fast:       2000  # test speed
variable_feed_slow:        5000  # working speed, loaded move
variable_accel_toolchange: 10000  # acceleration during toolchange

# --- toolchange retract/prime configuration ---
variable_swap_retract_len: 0   # [A] release retract: amount to retract when returning to the dock
variable_swap_prime_len:   0   # [B] pickup prime: amount to extrude when picking up
variable_swap_retract_spd: 1000

# ========================================================
# 【dock motion logic parameters】
# ========================================================
variable_dock_shift_x: -3.5   # lateral distance to open the extruder
variable_dock_dodge_y: 14     # relative Y offset for the clearance move
variable_dock_safe_y:  22     # relative Y offset for safe pull-out

#---------------------------------------------------------
# Per-tool (hotend-module) parameter configuration
#---------------------------------------------------------
# T0 configuration
variable_t0_dock_x: 244       # X coordinate where the T0 hotend module enters the large dock hole
variable_t0_dock_y: -24       # Y coordinate where the T0 hotend module enters the large dock hole

# T1 configuration
variable_t1_dock_x: 214
variable_t1_dock_y: -24

# T2 configuration
variable_t2_dock_x: 184
variable_t2_dock_y: -24

# T3 configuration
variable_t3_dock_x: 154
variable_t3_dock_y: -24

gcode:

#=================================================
# 2. tool-change commands; add entries for your hotend-module count
#=================================================
[gcode_macro T0]     # Activate T0: park the active tool, then pick up T0; if none is active, pick up T0 directly
gcode: change_tool T=0

[gcode_macro T1]
gcode: change_tool T=1

[gcode_macro T2]
gcode: change_tool T=2

[gcode_macro T3]
gcode: change_tool T=3

[gcode_macro UNTOOL]  # park the active hotend module in its dock
gcode: change_tool T=-1

#=================================================
# 3. state variable recording the currently picked-up tool
#=================================================
[gcode_macro _tool_status]
variable_current_tool: -1
gcode:

#=================================================
# 4. park the active tool (return its hotend module to the dock)
#=================================================
[gcode_macro _release_tool]
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set active_extruder = printer.toolhead.extruder %}

    # get the current nozzle core coordinates and relative offsets
    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    {% set msg = "Returning T%d" % tool %}   M118 {msg}

    # --- [A] release retract to prevent dock oozing ---
    {% set cur_temp = printer[active_extruder].temperature|float %}
    {% set min_temp = printer.configfile.settings[active_extruder].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp %}
       M83
       G1 E-{cfg.swap_retract_len} F{cfg.swap_retract_spd}
       #G4 P100
       #M400
    {% else %}
       M118 Temperature too low ({cur_temp}); skipping release retract.
    {% endif %}

    # --- start release motion, reverse of pickup motion ---
    G90
    # 1. move with the hotend module until X aligns with the large dock hole and Y is outside the dock at the dock entrance
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}

    # 2. move along Y with the hotend module fully into the dock
    G0 X{dock_x} Y{dock_y} F{cfg.feed_fast}
    #G4 P100
    #M400

    # 3. move laterally to open the extruder idler arm
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}

    # 4. move the toolhead out of the dock to separate the magnetically coupled hotend module
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow}

    # 5. move laterally in reverse to close the extruder idler arm
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_slow}

    # 6. leave the dock completely, to the dock entrance
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}
    #G4 P100
    #M400

#=================================================
# 5. pick up a tool (couple its hotend module)
#=================================================
[gcode_macro _pickup_tool]
gcode:
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}
    {% set tool = params.TOOL|int %}
    {% set prefix = "t" ~ tool %}
    {% set current_heater = "extruder" if tool == 0 else ("extruder" ~ tool) %}

    # get the current nozzle core coordinates and relative offsets
    {% set dock_x = cfg[prefix + "_dock_x"] %}
    {% set dock_y = cfg[prefix + "_dock_y"] %}
    {% set shift_x = cfg.dock_shift_x %}
    {% set dodge_y = cfg.dock_dodge_y %}
    {% set safe_y  = cfg.dock_safe_y %}

    {% set msg = "[Pickup] Picking up T%d" % tool %}   M118 {msg}

    # --- start pickup motion ---
    G90
    # 1. move to the dock entrance
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}

    # 2. advance Y to the clearance position so the idler arm can touch the arm standoff while the toolhead avoids the parked hotend module
    G0 X{dock_x} Y{dock_y + dodge_y} F{cfg.feed_fast}

    # 3. move laterally to open the extruder
    G0 X{dock_x + shift_x} Y{dock_y + dodge_y} F{cfg.feed_slow}

    # 4. move along Y fully into the dock so the toolhead and hotend module couple magnetically
    G0 X{dock_x + shift_x} Y{dock_y} F{cfg.feed_slow}
    #G4 P100
    #M400

    # 5. move laterally in reverse to close the extruder and clamp the filament
    G0 X{dock_x} Y{dock_y} F{cfg.feed_slow}

    # <<< in-dock extrusion compensation >>>
    {% set cur_temp = printer[current_heater].temperature|float %}
    {% set min_temp = printer.configfile.settings[current_heater].min_extrude_temp|default(170)|float %}
    {% if cur_temp >= min_temp %}
         M83
         G1 E{cfg.swap_prime_len} F{cfg.swap_retract_spd}
         #G4 P100
         #M400
    {% else %}
         M118 Temperature too low ({cur_temp}); skipping pickup handling.
    {% endif %}

    # 6. leave the dock completely, to the dock entrance
    G0 X{dock_x} Y{dock_y + safe_y} F{cfg.feed_fast}
    #G4 P100
    #M400

#=================================================
# 6. main switch macro
#=================================================
[gcode_macro change_tool]
gcode:
    {% set new_tool = params.T|default(-1)|int %}
    {% set old_tool = printer["gcode_macro _tool_status"].current_tool|int %}
    {% set cfg = printer["gcode_macro _toolchanger_cfg"] %}

    {% if new_tool == old_tool %}
        M118 Target state already matches current state (T{new_tool}); no action needed.
    {% else %}
        {% if new_tool == -1 %}
            M118 Park command received: parking T{old_tool} in its dock ...
        {% else %}
            M118 Switching tool: T{old_tool} -> T{new_tool}
        {% endif %}

        #save state before toolchange
        SAVE_GCODE_STATE NAME=tool_change

        # record current print acceleration and set toolchange acceleration
        {% set saved_accel = printer.toolhead.max_accel %}
        SET_VELOCITY_LIMIT ACCEL={cfg.accel_toolchange}

        #disable filament runout detection before toolchange
        #SET_FILAMENT_SENSOR SENSOR=tool_sensor ENABLE=0

        # lift
        G91
        G0 Z{cfg.z_hop} F{cfg.feed_z}
        G90

        #clear offsets so unified dock coordinates are used
        SET_GCODE_OFFSET X=0 Y=0 Z=0

        #park old tool
        {% if old_tool != -1 %}
            _release_tool TOOL={old_tool}
        {% else %}
            M118 No tool is currently active; skipping park operation.
        {% endif %}

        #pick up new tool
        {% if new_tool != -1 %}
            {% set next_heater = "extruder" if new_tool == 0 else ("extruder" ~ new_tool) %}
            {% set target_temp = printer[next_heater].target|float %}
            {% if target_temp > 0 %}
                {% if printer[next_heater].temperature < (target_temp - 2) %}
                    M118 T{new_tool} preheating...
                    TEMPERATURE_WAIT SENSOR={next_heater} MINIMUM={target_temp}
                {% endif %}
            {% endif %}

            _pickup_tool  TOOL={new_tool}
        {% else %}
            M118 Active tool parked.
        {% endif %}

        #update state variable
        SET_GCODE_VARIABLE MACRO=_tool_status VARIABLE=current_tool VALUE={new_tool}

        #restore to the pre-toolchange position
        #RESTORE_GCODE_STATE NAME=tool_change MOVE=1 MOVE_SPEED=400
        RESTORE_GCODE_STATE NAME=tool_change MOVE=0
        # New: restore the original main print acceleration
        SET_VELOCITY_LIMIT ACCEL={saved_accel}

        # ==========================================
        # apply nozzle offset using external saved-variable reads only
        # ==========================================
        {% if new_tool != -1 %}
            {% set svv = printer.save_variables.variables %}

            # build the key name as a string and read directly from svv; default to 0.0 if missing
            {% set off_x = svv["t" ~ new_tool ~ "_offset_x"] | default(0.0) | float %}
            {% set off_y = svv["t" ~ new_tool ~ "_offset_y"] | default(0.0) | float %}
            {% set off_z = svv["t" ~ new_tool ~ "_offset_z"] | default(0.0) | float %}

            SET_GCODE_OFFSET X={off_x} Y={off_y} Z={off_z} MOVE=0
            { action_respond_info("T" ~ new_tool ~ " loaded calibration values: X=" ~ off_x ~ " Y=" ~ off_y ~ " Z=" ~ off_z) }
        {% endif %}

        #filament runout detection after toolchange
        # {% if new_tool != -1 %}
        #     M400     ; force waiting until all pickup and physical-position recovery moves complete
        #     #G4 P200  ; pause for 0.2 seconds
        #     _VERIFY_TOOL_AND_ENABLE_SENSOR ; call a separate submacro to evaluate the state
        # {% endif %}
        # If new_tool is -1 (UNTOOL park), skip detection and leave the sensor disabled.

        SAVE_VARIABLE VARIABLE=current_tool VALUE={new_tool}

    {% endif %}

#filament runout and toolchange-failure detection switch definition
# [filament_switch_sensor tool_sensor]
# switch_pin: !expander:PA9
# pause_on_runout: False
# runout_gcode:
#     { action_respond_info("Error: filament runout during printing. Print paused.") }
#     PAUSE # action when triggered during printing, meaning runout
# insert_gcode:
#     { action_respond_info("Filament inserted.") } # action when filament is inserted

# [delayed_gcode DISABLE_SENSOR_ON_BOOT]
# # automatically run this macro 1 second after startup
# initial_duration: 1.0
# gcode:
#     # force-disable runout detection
#     SET_FILAMENT_SENSOR SENSOR=tool_sensor ENABLE=0
#     { action_respond_info("Initialization: no active hotend module; runout detection is muted by default.") }

#filament runout and toolchange-failure detection
# [gcode_macro _VERIFY_TOOL_AND_ENABLE_SENSOR]
# description: after pickup completes, read the microswitch state to determine whether pickup failed
# gcode:
#     {% set has_filament = printer["filament_switch_sensor tool_sensor"].filament_detected %}

#     {% if has_filament %}  # switch is in the normal state
#         { action_respond_info("Toolchange succeeded, filament state is normal, re-enabling runout detection.") }
#         SET_FILAMENT_SENSOR SENSOR=tool_sensor ENABLE=1  # restore runout detection monitoring
#     {% else %}  # switch is in an abnormal triggered state
#         { action_respond_info("Fatal error: toolchange failed (no nozzle picked up) or the new tool has no filament. Emergency pause triggered.") }
#         PAUSE
