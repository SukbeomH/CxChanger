#     {% if has_filament %}  # 스위치 정상 상태
#         { action_respond_info("툴체인지 성공, 필라멘트 상태 정상. 런아웃 감지를 다시 켭니다.") }
#         SET_FILAMENT_SENSOR SENSOR=tool_sensor ENABLE=1  # 런아웃 감지 모니터링 복원
#     {% else %}  # 스위치 비정상 트리거 상태
#         { action_respond_info("치명적 오류: 툴체인지 실패(노즐을 집지 못함) 또는 새 툴에 필라멘트 없음. 긴급 일시정지했습니다.") }
#         PAUSE
#     {% endif %}

#M109의 노즐 온도 안정 대기 제거
[gcode_macro M109]
rename_existing: M99109
gcode:
    {% set s = params.S|default(0)|float %}
    {% set r = params.R|default(0)|float %}
    {% set target_temp = s if s > 0 else r %}
    {% set tool_index = params.T|default(-1)|int %}
    {% set sensor_name = printer.toolhead.extruder %}

    {% if tool_index != -1 %}
        {% if tool_index == 0 %}
            {% set sensor_name = "extruder" %}
        {% else %}
            {% set sensor_name = "extruder" ~ tool_index %}
        {% endif %}
    {% endif %}

    {% if target_temp > 0 %}
        {% if tool_index != -1 %}
            M104 S{target_temp} T{tool_index}
        {% else %}
            M104 S{target_temp}
        {% endif %}
        TEMPERATURE_WAIT SENSOR={sensor_name} MINIMUM={target_temp - 1.0}
    {% endif %}
